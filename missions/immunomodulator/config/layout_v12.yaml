# Layout V12 — GLANCE feedback iteration
# From V11: cut words 65->30, boost saliency, readability at 50%, accessibility
# All positions in fractions of canvas (0.0-1.0)

canvas:
  width: 3600          # same as V11
  height: 2000         # same as V11
  delivery_width: 1200
  delivery_height: 667

zones:
  margin_left:
    x_pct: 0.0
    width_pct: 0.18
  bronchus:
    x_pct: 0.18
    width_pct: 0.58
  margin_right:
    x_pct: 0.76
    width_pct: 0.24

# Bronchus vertical bounds — LARGER (saliency boost)
bronchus:
  y_start_pct: 0.12    # moved up slightly for more bronchus space
  y_end_pct: 0.64      # extended down slightly
  corner_radius: 22
  border_width: 4      # thicker border for visibility
  border_color: "#6B7280"  # darker for contrast
  bands:
    lumen:
      height_pct: 0.15
    epithelium:
      height_pct: 0.28
    lamina:
      height_pct: 0.35
    muscle:
      height_pct: 0.22
  separator_width: 5   # thicker separators
  separator_color: "#6B7280"  # darker
  separator_dash: "12,6"

# Gradient background (L->R across full canvas) — stronger contrast
gradient:
  left_color: "#FFE5E5"   # more saturated red
  center_color: "#FFFFFF"
  right_color: "#E5FFF5"   # more saturated green

# Zone headers — BIGGER font (readability at 50%)
zone_headers:
  y_pct: 0.025
  height: 56            # was 44 — bigger
  font_size: 42          # was 34 — bigger for 50% zoom readability
  left:
    bg_color: "#DC2626"
    text_color: "#FFFFFF"
    pill_rx: 22
  center:
    bg_color: "#E5E7EB"
    text_color: "#1F2937"   # darker text for contrast
    pill_rx: 22
  right:
    bg_color: "#059669"
    text_color: "#FFFFFF"
    pill_rx: 22

# Product pills — BIGGER (saliency boost)
product_pills:
  y_pct: 0.075
  pill_height: 52        # was 40 — bigger
  pill_rx: 24
  pill_gap: 28
  font_size: 34          # was 28 — bigger
  text_color: "#FFFFFF"

# Child silhouettes — 1.5x BIGGER (saliency boost)
child_sick:
  x_pct: 0.50
  y_pct: 0.14
  scale: 2.7            # was 1.8 — 1.5x scale

child_healthy:
  x_pct: 0.50
  y_pct: 0.14
  scale: 2.25           # was 1.5 — 1.5x scale

# Disease cascade — SIMPLIFIED text, bigger font
disease_cascade:
  y_start_pct: 0.50
  step_height: 44        # was 38 — bigger
  step_gap: 8
  step_width_pct: 0.88
  pill_rx: 12
  font_size: 30          # was 24 — bigger for readability
  arrow_size: 14
  bg_color: "#FEE2E2"
  text_color: "#991B1B"
  border_color: "#FECACA"
  arrow_color: "#DC2626"

# Vicious cycle — kept but repositioned
vicious_cycle:
  center_x_pct: 0.50
  center_y_pct: 0.70
  radius_x: 150          # slightly larger
  radius_y: 118
  stations:
    - label: "Viral RTIs"
      angle_deg: -90
    - label: "Th2 bias"
      angle_deg: 0
    - label: "Remodeling"
      angle_deg: 90
    - label: "Re-suscept."
      angle_deg: 170
  bottom_label: "Wheezing/Asthma"
  font_size: 32          # was 28 — bigger

# Evidence bars — BIGGER AND WIDER (saliency boost)
evidence:
  y_start_pct: 0.38
  bar_height: 80         # was 64 — bigger
  bar_gap: 22            # was 18
  max_width_pct: 0.92    # was 0.88 — wider
  title: "Clinical evidence"
  title_font_size: 44    # was 38 — bigger
  items:
    - product: om85
      width_pct: 1.0
      label: "18 RCTs"
      name: "OM-85"
    - product: pmbl
      width_pct: 0.55
      label: "5 RCTs"
      name: "PMBL"
    - product: mv130
      width_pct: 0.30
      label: "1 RCT"
      name: "MV130"
    - product: crl1505
      width_pct: 0.15
      label: "Preclinical"
      name: "CRL1505"

# Mechanism boxes — SIMPLIFIED to single keyword per box, bigger
mechanism_boxes:
  y_start_pct: 0.67
  box_height: 60         # was 68 — slightly shorter (no subtitle line)
  box_gap: 12
  box_rx: 12
  border_left_width: 8   # was 6 — thicker accent
  title_font_size: 36    # was 28 — bigger for readability
  subtitle_font_size: 0  # no subtitles in V12
  bg_color: "#FFFFFF"
  bg_opacity: 0.94
  border_color: "#D1D5DB"  # slightly darker

# Product legend — bigger
legend:
  y_pct: 0.93
  square_size: 40        # was 34
  gap: 44
  font_size: 40          # was 36

# CRL1505 relay arc
crl1505_relay:
  gut_icon_y_pct: 0.95
  gut_icon_x_pct: 0.60
  target_band: "lamina"
  target_x_pct: 0.75
  arc_width: 7           # was 6 — slightly thicker

# Band content parameters
band_content:
  lumen:
    virus_count: 3
    virus_radius: 28     # was 24 — bigger
    virus_x_range: [0.05, 0.30]
    iga_count: 4
    iga_height: 40       # was 35 — bigger
    iga_x_range: [0.70, 0.95]
  epithelium:
    cell_count: 24
    cell_height_pct: 0.60
    gap_count_sick: 6
    gap_count_healthy: 0
    shield_x_pct: 0.55
    staple_x_range: [0.50, 0.85]
  lamina:
    split_pct: 0.45
    dc_sick_x_pct: 0.20
    dc_healthy_x_pct: 0.75
    dc_radius: 48        # was 42 — bigger
    helix_scale: 0.5
    balance_x_pct: 0.70
    balance_width: 130   # was 120
  muscle:
    thickness_sick_pct: 1.0
    thickness_healthy_pct: 0.45

# V10.5 organic density parameters (carried forward)
density:
  lumen_stipple_density: 0.0008
  epithelium_stipple_density: 0.0015
  lamina_stipple_density: 0.0012
  stipple_r_min: 1.0
  stipple_r_max: 2.5
  lamina_crosshatch_spacing: 28
  lamina_crosshatch_opacity: 0.06
  muscle_fiber_count: 16
  muscle_fiber_opacity: 0.12
  epithelium_cells: 42
  tight_junction_n_zigs: 6
  tight_junction_amplitude: 3
  nucleus_probability: 0.7
  cilia_per_cell: 6
  cilia_wave_amplitude: 2
  virus_count_extra: 4
  virus_extra_radius: 16     # was 14 — slightly bigger
  virus_extra_x_range: [0.02, 0.38]
  macrophage_count_sick: 2
  macrophage_count_healthy: 3
  macrophage_radius: 20      # was 18 — bigger
  t_helper_count: 4
  t_helper_radius: 14        # was 12
  treg_count: 2
  treg_radius: 16            # was 14
  immune_scatter_density: 0.0006
  immune_scatter_r_min: 3
  immune_scatter_r_max: 6

font:
  family: "Helvetica, Arial, sans-serif"
  min_size: 36               # was 28 — minimum 36pt for 50% zoom readability
