<!-- Child sick: hunched, coughing posture. ~100x150 viewbox. -->
<!-- Use fill="currentColor" / stroke="currentColor" for compositor tinting. -->
<g>
  <!-- Head -->
  <circle cx="55" cy="22" r="18" fill="currentColor" opacity="0.2" stroke="currentColor" stroke-width="1.8"/>
  <!-- Frown -->
  <path d="M 48,28 Q 55,23 62,28" fill="none" stroke="currentColor" stroke-width="1.2" opacity="0.5"/>
  <!-- Hunched torso (leaning forward) -->
  <path d="M 42,38 Q 38,65 40,88 L 65,88 Q 68,65 66,38 Z"
        fill="currentColor" opacity="0.15" stroke="currentColor" stroke-width="1.5"/>
  <!-- Left arm (drooping) -->
  <path d="M 42,44 Q 30,62 32,75" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
  <!-- Right arm (near mouth — coughing) -->
  <path d="M 66,44 Q 76,34 72,24" fill="none" stroke="currentColor" stroke-width="2" opacity="0.8"/>
  <!-- Left leg -->
  <path d="M 45,88 L 38,130" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Right leg -->
  <path d="M 60,88 L 64,130" fill="none" stroke="currentColor" stroke-width="2.5"/>
  <!-- Cough puffs -->
  <path d="M 78,18 A 5,5 0 0,1 78,28" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.4"/>
  <path d="M 85,14 A 7,7 0 0,1 85,28" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.35"/>
  <path d="M 92,10 A 9,9 0 0,1 92,28" fill="none" stroke="currentColor" stroke-width="1.3" opacity="0.3"/>
</g>
