timer:
  exposure_ms: 5000
  countdown_seconds: 3

# ── Flux Mode ───────────────────────────────────────────────────────────
# Ambient attention protocol: target GA is embedded in a feed of N items.
# Participant scrolls through naturally. Questions are about one random item.
# Rationale: real-world GA consumption happens during passive browsing,
# not focused 5-second exposure with countdown priming (System 2 bias).
flux:
  enabled: true
  n_items: 8                # total items in feed (including target)
  item_duration_ms: 4000    # each item visible for 4s
  target_position: random   # "random" or fixed int (1-indexed)
  scroll_transition_ms: 300 # transition between items

profile:
  clinical_domains:
    - "Pédiatre"
    - "Médecin Généraliste"
    - "Chercheur Bio/Médical"
    - "Professionnel Tech/Data"
    - "Grand Public"
  data_literacy:
    - "Auteur publié (peer-review)"
    - "Profil Tech/Data"
    - "Grand public"
  experience_ranges:
    - "<5 ans"
    - "5-15 ans"
    - ">15 ans"
  colorblind_options:
    - "Vision normale"
    - "Daltonien (deutéranopie)"
    - "Daltonien (protanopie)"
    - "Je ne sais pas"

