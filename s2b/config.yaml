# ── Constants ──────────────────────────────────────────────────────────
# Classification: PHENOMENON = justified by science/cognition
#                 CALIBRATED = derived from empirical data (overridable here)
#                 ARBITRARY  = no justification (must be externalized here)
#
# See docs/SEMANTIC_SCORING.md "Constant Audit" section for full rationale.

constants:
  # -- Semantic scoring (semantic.py) --
  # CALIBRATED: model benchmarked in docs/SEMANTIC_SCORING.md section 1.
  # Sample: 9 French test phrases, 2 GA images.
  semantic_model_name: "sentence-transformers/paraphrase-multilingual-mpnet-base-v2"
  # CALIBRATED: threshold derived from calibration gap [0.37, 0.52].
  # 0.40 sits in the clean middle. See docs/SEMANTIC_SCORING.md section 3.
  # Sample: 9 calibration phrases.
  s9a_pass_threshold: 0.40

  # -- Speed-accuracy (scoring.py) --
  # CALIBRATED: RT2 fast/slow boundary. S2b_Mathematics.md section 3.
  # Based on cognitive reaction time literature: pre-attentive processing
  # completes in <250ms (Treisman), full decision in 1-3s.
  # 3000ms chosen as upper bound of fluent decision-making.
  rt2_fast_slow_ms: 3000
  # CALIBRATED: RT2 hesitant/lost boundary. S2b_Mathematics.md section 3.
  # Beyond 8000ms the participant is not guided by the design.
  rt2_hesitant_lost_ms: 8000

  # -- Composite score (scoring.py, app.py) --
  # CALIBRATED: S2b pass/fail display threshold. S2b_Mathematics.md section 7.
  # Interpretation boundary for dashboard label.
  s2b_pass_threshold: 0.70

  # -- McNemar test (analytics.py) --
  # CALIBRATED: minimum number of paired observations for McNemar.
  # Statistical convention — below 10 pairs the chi2 approximation is unreliable.
  mcnemar_min_pairs: 10

  # -- Session (app.py) --
  # ARBITRARY: participant cookie lifetime in seconds (30 days).
  cookie_max_age_seconds: 2592000
