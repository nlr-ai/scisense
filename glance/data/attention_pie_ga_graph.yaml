# Attention Is All You Need — Pie Chart CONTROL (L3 Graph)
# Same data as attention_bar — but encoded with AREA channel
# Channel: AREA (Stevens beta = 0.7) — should score LOWER than bar version
# Created: 2026-03-25

nodes:

  # THINGS — same 4 models, but with LOWER stability to reflect
  # that area encoding compresses perceived differences
  - id: "thing:transformer_big"
    name: "Transformer (Big)"
    node_type: thing
    synthesis: >
      Transformer (Big) model. BLEU 28.4. Encoded as pie slice — area
      channel (Stevens beta = 0.7). Perceived magnitude compressed to 70%
      of actual. Harder to compare precisely vs bar chart.
    weight: 1.0
    energy: 0.30
    stability: 0.70
    hierarchy: 1.0
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 28.4. Pie slice angle ~108 deg. Area encodes score — but beta=0.7 compresses perception."

  - id: "thing:transformer_base"
    name: "Transformer (Base)"
    node_type: thing
    synthesis: >
      Transformer (Base). BLEU 27.3. Pie slice nearly same size as Big —
      the 1.1 BLEU difference is almost invisible in area encoding.
    weight: 0.85
    energy: 0.35
    stability: 0.65
    hierarchy: 0.85
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 27.3. Pie slice angle ~104 deg. Almost indistinguishable from Big slice."

  - id: "thing:convs2s"
    name: "ConvS2S"
    node_type: thing
    synthesis: >
      ConvS2S. BLEU 25.2. Pie slice moderately smaller. Area compression
      makes the 3.2 BLEU gap with Big look smaller than it is.
    weight: 0.65
    energy: 0.30
    stability: 0.65
    hierarchy: 0.65
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 25.2. Pie slice angle ~96 deg."

  - id: "thing:gnmt_rl"
    name: "GNMT+RL"
    node_type: thing
    synthesis: >
      GNMT+RL. BLEU 24.6. Smallest pie slice. The 3.8 BLEU gap with Big
      is compressed by area encoding — perceived as smaller difference.
    weight: 0.55
    energy: 0.30
    stability: 0.65
    hierarchy: 0.55
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 24.6. Pie slice angle ~93 deg."

  # NARRATIVE — same comparison, degraded by encoding
  - id: "narrative:transformer_benchmark"
    name: "Transformer Dominance (pie — degraded)"
    node_type: narrative
    synthesis: >
      Same data as bar chart version but encoded with AREA (pie slices).
      Stevens beta = 0.7 compresses perceived differences. The hierarchy
      between models is harder to perceive. Pie charts are ranked 4th
      in Cleveland & McGill's channel effectiveness hierarchy.
    weight: 0.90
    energy: 0.40
    stability: 0.65
    permanence: 1.0
    ambivalence: 0.0

  # MOMENT — same paper
  - id: "moment:vaswani_2017"
    name: "Vaswani et al. 2017 (NeurIPS)"
    node_type: moment
    synthesis: >
      Same source paper. The data quality is identical — only the
      visual encoding degrades comprehension.
    weight: 0.90
    energy: 0.05
    stability: 0.95
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0

  # SPACE — the chart domain
  - id: "space:bleu_benchmark"
    name: "BLEU Benchmark Domain (pie)"
    node_type: space
    synthesis: >
      WMT 2014 EN-DE. Same benchmark, but pie chart format. Area
      encoding instead of length. Visual spin risk: pie slices
      compress small differences.
    weight: 0.70
    energy: 0.20
    stability: 0.75
    permanence: 1.0
    ambivalence: 0.0

  # THING — the degraded channel
  - id: "thing:area_channel"
    name: "Area Channel (beta=0.7)"
    node_type: thing
    synthesis: >
      Pie slice AREA is the primary channel. Stevens beta = 0.7 —
      perceived magnitude is only 70% of actual. This compresses
      differences between models. Cleveland & McGill rank 4.
      WARNING: visual spin — small differences become invisible.
    weight: 0.80
    energy: 0.50
    stability: 0.60
    permanence: 1.0
    ambivalence: 0.0

links:

  # Models → narrative
  - id: "link:tbig_to_narrative"
    node_a: "thing:transformer_big"
    node_b: "narrative:transformer_benchmark"
    weight: 0.95
    hierarchy: 0.95
    trust: 0.95
    synthesis: "Transformer Big is top — but pie encoding makes this harder to see."

  - id: "link:tbase_to_narrative"
    node_a: "thing:transformer_base"
    node_b: "narrative:transformer_benchmark"
    weight: 0.85
    hierarchy: 0.85
    trust: 0.95
    synthesis: "Transformer Base — nearly indistinguishable from Big in pie format."

  - id: "link:convs2s_to_narrative"
    node_a: "thing:convs2s"
    node_b: "narrative:transformer_benchmark"
    weight: 0.65
    hierarchy: -0.30
    trust: 0.95
    synthesis: "ConvS2S — gap compressed by area encoding."

  - id: "link:gnmt_to_narrative"
    node_a: "thing:gnmt_rl"
    node_b: "narrative:transformer_benchmark"
    weight: 0.55
    hierarchy: -0.45
    trust: 0.95
    synthesis: "GNMT+RL — smallest slice, but difference looks minor in pie."

  # Hierarchy between models
  - id: "link:tbig_to_tbase"
    node_a: "thing:transformer_big"
    node_b: "thing:transformer_base"
    weight: 0.90
    hierarchy: 0.15
    synthesis: "Big > Base. Difference nearly invisible in pie — area compresses the 1.1 BLEU gap."

  - id: "link:tbase_to_convs2s"
    node_a: "thing:transformer_base"
    node_b: "thing:convs2s"
    weight: 0.80
    hierarchy: 0.30
    synthesis: "Base > ConvS2S. Area encoding compresses this gap."

  - id: "link:convs2s_to_gnmt"
    node_a: "thing:convs2s"
    node_b: "thing:gnmt_rl"
    weight: 0.65
    hierarchy: 0.10
    synthesis: "ConvS2S > GNMT. Smallest gap — barely visible in pie."

  # Evidence
  - id: "link:vaswani_to_narrative"
    node_a: "moment:vaswani_2017"
    node_b: "narrative:transformer_benchmark"
    weight: 0.90
    trust: 0.95
    synthesis: "Same data source — encoding degrades perception, not data quality."

  # Domain containment
  - id: "link:domain_to_tbig"
    node_a: "space:bleu_benchmark"
    node_b: "thing:transformer_big"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Pie chart contains Transformer Big slice."

  - id: "link:domain_to_tbase"
    node_a: "space:bleu_benchmark"
    node_b: "thing:transformer_base"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Pie chart contains Transformer Base slice."

  - id: "link:domain_to_convs2s"
    node_a: "space:bleu_benchmark"
    node_b: "thing:convs2s"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Pie chart contains ConvS2S slice."

  - id: "link:domain_to_gnmt"
    node_a: "space:bleu_benchmark"
    node_b: "thing:gnmt_rl"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Pie chart contains GNMT+RL slice."

  # Channel link
  - id: "link:channel_to_narrative"
    node_a: "thing:area_channel"
    node_b: "narrative:transformer_benchmark"
    weight: 0.80
    affinity: 0.5
    friction: 0.6
    synthesis: "Area channel degrades the benchmark comparison. Beta=0.7 — suboptimal encoding."

# VISUAL CHANNEL SCORING
# Primary: AREA (Stevens beta=0.7) — pie chart slices
# Secondary: ANGLE — pie sectors share center point
# Tertiary: COLOR_HUE — categorical model identity
# Expected GLANCE performance: LOWER than bar version
# The SAME data, encoded with a WORSE channel = lower comprehension
