  # Channel link
  - id: "link:channel_to_narrative"
    node_a: "thing:length_channel"
    node_b: "narrative:transformer_benchmark"
    weight: 0.80
    affinity: 1.0
    synthesis: "Bar length channel encodes the benchmark comparison. Beta=1.0 — optimal quantitative encoding."

