    synthesis: "ConvS2S > GNMT. BLEU 25.2 vs 24.6. Bar length difference 2%."

  # Evidence
  - id: "link:vaswani_to_narrative"
    node_a: "moment:vaswani_2017"
    node_b: "narrative:transformer_benchmark"
