# Attention Is All You Need — Bar Chart GA (L3 Graph)
# Vaswani et al. 2017, NeurIPS — BLEU scores WMT 2014 EN→DE
# Channel: LENGTH (Stevens beta = 1.0) — should score HIGH
# Created: 2026-03-25

nodes:

  # THINGS — the 4 models being compared
  - id: "thing:transformer_big"
    name: "Transformer (Big)"
    node_type: thing
    synthesis: >
      Transformer (Big) model. Highest BLEU score: 28.4 on WMT 2014 EN-DE.
      The correct answer — the model the reader should identify as best.
      Encoded as longest bar in bar chart.
    weight: 1.0
    energy: 0.0
    stability: 0.95
    hierarchy: 1.0
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 28.4. Bar length = 100% of max. Position = top of chart."

  - id: "thing:transformer_base"
    name: "Transformer (Base)"
    node_type: thing
    synthesis: >
      Transformer (Base) model. BLEU score: 27.3 on WMT 2014 EN-DE.
      Second-best. Close to Big variant — difference encoded by bar length.
    weight: 0.85
    energy: 0.0
    stability: 0.95
    hierarchy: 0.85
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 27.3. Bar length = 96% of max. Position = second."

  - id: "thing:convs2s"
    name: "ConvS2S"
    node_type: thing
    synthesis: >
      Convolutional Sequence-to-Sequence model (Gehring et al. 2017).
      BLEU score: 25.2 on WMT 2014 EN-DE. CNN-based architecture.
    weight: 0.65
    energy: 0.0
    stability: 0.95
    hierarchy: 0.65
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 25.2. Bar length = 89% of max. Position = third."

  - id: "thing:gnmt_rl"
    name: "GNMT+RL"
    node_type: thing
    synthesis: >
      Google Neural Machine Translation with reinforcement learning.
      BLEU score: 24.6 on WMT 2014 EN-DE. RNN-based baseline.
    weight: 0.55
    energy: 0.0
    stability: 0.95
    hierarchy: 0.55
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: "BLEU 24.6. Bar length = 87% of max. Position = bottom."

  # NARRATIVE — the comparison story
  - id: "narrative:transformer_benchmark"
    name: "Transformer Dominance"
    node_type: narrative
    synthesis: >
      The Transformer architecture achieves state-of-the-art BLEU scores,
      surpassing both CNN (ConvS2S) and RNN (GNMT+RL) architectures.
      Self-attention alone replaces recurrence for machine translation.
      Bar chart encoding: LENGTH channel (Stevens beta = 1.0).
    weight: 0.90
    energy: 0.10
    stability: 0.90
    permanence: 1.0
    ambivalence: 0.0

  # MOMENT — the paper
  - id: "moment:vaswani_2017"
    name: "Vaswani et al. 2017 (NeurIPS)"
    node_type: moment
    synthesis: >
      'Attention Is All You Need' — the foundational Transformer paper.
      NeurIPS 2017. One of the most cited ML papers. WMT 2014 benchmark.
    weight: 0.90
    energy: 0.05
    stability: 0.95
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0

  # SPACE — the chart domain
  - id: "space:bleu_benchmark"
    name: "BLEU Benchmark Domain"
    node_type: space
    synthesis: >
      WMT 2014 EN-DE translation benchmark. BLEU score comparison.
      4 models evaluated. Bar chart format — length encodes score.
    weight: 0.70
    energy: 0.05
    stability: 0.90
    permanence: 1.0
    ambivalence: 0.0

  # THING — the visual channel
  - id: "thing:length_channel"
    name: "Length Channel (beta=1.0)"
    node_type: thing
    synthesis: >
      Bar LENGTH is the primary visual channel. Stevens power law
      beta = 1.0 — perceived magnitude matches actual magnitude with
      no compression. The most accurate quantitative channel available.
    weight: 0.80
    energy: 0.0
    stability: 0.95
    permanence: 1.0
    ambivalence: 0.0

links:

