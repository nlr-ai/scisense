    node_a: "thing:transformer_big"
    node_b: "narrative:transformer_benchmark"
    weight: 0.95
    hierarchy: 0.95
    trust: 0.95
    synthesis: "Transformer Big is the top performer in the benchmark narrative."

  - id: "link:tbase_to_narrative"
    node_a: "thing:transformer_base"
    node_b: "narrative:transformer_benchmark"
    weight: 0.85
    hierarchy: 0.85
    trust: 0.95
    synthesis: "Transformer Base confirms the architecture's superiority."

  - id: "link:convs2s_to_narrative"
