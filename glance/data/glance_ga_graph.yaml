    energy: 0.10
    stability: 0.90
    recency: 0.5
    polarity: -1.0
    ambivalence: 0.0

  - id: "narrative:spin"
    name: "Visual Spin"
    node_type: narrative
    synthesis: "Le mécanisme de distorsion. Stevens β≈0.7 compresse l'aire. Vorland 2024 documente le spin textuel, extrapolé au visuel."
    weight: 0.50
    energy: 0.75
    stability: 0.65
    recency: 0.7
    friction: 0.8
    aversion: 0.7
    ambivalence: 0.0
    content: "Noeud flou — l'extrapolation de Vorland (spin textuel) vers le spin visuel perceptif n'est pas directe."

  - id: "narrative:perceptual_science"
    name: "Science Perceptive"
    node_type: narrative
    synthesis: "Cleveland & McGill (1984) + Stevens (1957) + MacEachren (2012). La fondation théorique : position > longueur > aire > couleur. Justifie GLANCE et explique pourquoi le spin fonctionne."
    weight: 0.60
    energy: 0.10
    stability: 0.90
    recency: 0.3
    ambivalence: 0.0
    content: "Cleveland & McGill 1984: hiérarchie des canaux visuels. Stevens 1957: power law β≈0.7 pour l'aire. MacEachren 2012: cartographic perception. Fondation solide — pas controversée."

  - id: "narrative:protocol"
    name: "Protocole GLANCE"
    node_type: narrative
    synthesis: "La méthodologie GLANCE elle-même : stream mode, inertial scroll, saillance S10. Le HOW distinct du SCORE. Noeud actif — protocole en construction."
    weight: 0.80
    energy: 0.60
    stability: 0.60
    recency: 1.0
    ambivalence: 0.0
    content: "Distinct de thing:glance (le score/benchmark). Ceci est le protocole de test : exposition 5s en scroll inertiel, mesure de saillance, questionnaire de compréhension."

  - id: "thing:glance"
    name: "GLANCE (≥80%)"
    node_type: thing
    synthesis: "Le protocole GLANCE. Premier benchmark de compréhension GA. Target S9b ≥80% (vs GRADE 74%)."
    weight: 1.00
    energy: 0.90
    stability: 0.40
    recency: 1.0
    hierarchy: 1.0
    trust: 0.80
    ambivalence: 0.0
    content: "DANGER: weight max + stability min + energy max. Le ≥80% est un TARGET, pas un résultat. Instable tant que N=0."

  - id: "thing:5_seconds"
    name: "Contrainte 5 secondes"
    node_type: thing
    synthesis: "L'exposition de 5 secondes — paramètre de design critique. GLANCE est construit autour de cette contrainte. Temps réel de scroll passé sur un GA dans un feed."
    weight: 0.65
    energy: 0.15
    stability: 0.85
    recency: 0.8
    ambivalence: 0.0
    content: "5 seconds = realistic exposure time in social media scroll. Derived from feed behavior studies. The entire GLANCE protocol is built around this constraint."

