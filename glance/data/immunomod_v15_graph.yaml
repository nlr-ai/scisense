  energy: 0.0
  id: space:main_diagram
  name: 'Top Diagram: Pathological to Protected State'
  node_type: space
  stability: 1.0
  synthesis: The upper two-thirds of the GA, illustrating a biological timeline from
    a pathological state (left, red) caused by viral infection to a protected state
    (right, green) following immunomodulator treatment. It contains cellular-level
    diagrams and human silhouettes.
  weight: 0.7
- bbox:
  - 0.0
  - 0.62
  - 1.0
  - 0.38
  energy: 0.0
  id: space:mechanism_chart
  name: 'Bottom Chart: Mechanism of Action'
  node_type: space
  stability: 1.0
  synthesis: The lower third of the GA, titled 'MECHANISM OF ACTION'. It is a flow
    chart that links specific treatments to their biological mechanisms and resulting
    clinical outcomes.
  weight: 0.3
- energy: 0.0
  id: narrative:protection
  name: Certain immunomodulators protect children from pathological respiratory conditions
    by shifting their immune response.
  node_type: narrative
  stability: 1.0
  synthesis: The core message is that these treatments can transform a child's health
    from a state of recurrent viral infections and asthma to a protected, healthy
    state by rebalancing the immune system.
  weight: 1.0
- energy: 0.0
  id: narrative:mechanisms
  name: The protective effect is achieved by improving epithelial barriers and modulating
    innate and adaptive immunity.
  node_type: narrative
  stability: 1.0
  synthesis: This message explains how the treatments work at a biological level,
    detailing the specific pathways (barrier function, immunity types) that lead to
    the observed clinical benefits.
  weight: 0.8
- energy: 0.0
  id: narrative:evidence
  name: Strong clinical evidence supports the use of these treatments, particularly
    OM-85.
  node_type: narrative
  stability: 1.0
  synthesis: This message provides credibility and quantifies the level of scientific
    backing for the treatments, highlighting that this is not just a theoretical model
    but is supported by human trials.
  weight: 0.7
