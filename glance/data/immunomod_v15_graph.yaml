metadata:
  accessibility_issues:
  - Heavy reliance on color-coding (red for pathological, green for protected; specific
    colors for treatments) which may not be accessible to colorblind users.
  - Some text labels are very small and may be difficult to read.
  chart_type: infographic
  color_count: 8
  dominant_encoding: A process diagram showing a transition from a pathological to
    a protected state.
  executive_summary_fr: Cette infographie illustre comment certains immunomodulateurs,
    comme les lysats bactériens, protègent les enfants contre les infections respiratoires
    virales et l'asthme. Ils agissent en rééquilibrant la réponse immunitaire et en
    renforçant la barrière épithéliale, passant d'un état pathologique à un état protégé,
    avec des preuves cliniques solides soutenant leur efficacité.
  figure_text_ratio: 0.85
  has_legend: true
  hierarchy_clear: true
  main_finding: Immunomodulators protect children from viral respiratory infections
    and asthma by shifting the immune response from a pathological Th2 bias to a protective
    Th1/Treg-mediated state, a mechanism supported by significant clinical evidence.
  visual_channels_used:
  - position
  - color_hue
  - shape
  - text_label
  - grouping
  - alignment
  - icon
  - length
  - connecting_line
  word_count: 45
