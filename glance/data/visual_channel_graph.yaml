  - id: "link:comp_aesthetic"
    node_a: "space:vc:compound"
    node_b: "thing:vc:aesthetic_appeal"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Compound space contains aesthetic appeal."

  # =====================================================================
  # HIERARCHY LINKS (Cleveland & McGill accuracy ordering)
  # Within encoding space: position > length > angle > area > volume > saturation
  # =====================================================================

  - id: "link:hierarchy_pos_length"
    node_a: "thing:vc:position_common_scale"
    node_b: "thing:vc:length"
    weight: 0.90
    hierarchy: 0.05
    affinity: 0.90
    synthesis: "Position is marginally more accurate than length (beta ~1.0 both, but position has lower variance). Cleveland & McGill rank 1 vs 3."

  - id: "link:hierarchy_length_angle"
    node_a: "thing:vc:length"
    node_b: "thing:vc:angle_slope"
    weight: 0.80
    hierarchy: 0.15
    synthesis: "Length (beta ~1.0) is more accurate than angle (beta ~0.85). Cleveland & McGill."

  - id: "link:hierarchy_angle_area"
    node_a: "thing:vc:angle_slope"
    node_b: "thing:vc:area"
    weight: 0.75
    hierarchy: 0.15
    synthesis: "Angle (beta ~0.85) is more accurate than area (beta ~0.7). Stevens power law."

  - id: "link:hierarchy_area_volume"
    node_a: "thing:vc:area"
    node_b: "thing:vc:volume"
    weight: 0.70
    hierarchy: 0.10
    synthesis: "Area (beta ~0.7) is more accurate than volume (beta ~0.6). Volume universally condemned."

  - id: "link:hierarchy_volume_saturation"
    node_a: "thing:vc:volume"
    node_b: "thing:vc:saturation_magnitude"
    weight: 0.60
    hierarchy: 0.10
    synthesis: "Volume (beta ~0.6) is more accurate than saturation (poorly characterized, high variance)."

  # =====================================================================
  # AFFINITY LINKS (channels that reinforce each other = redundant encoding)
  # =====================================================================

  - id: "link:affinity_length_luminance"
    node_a: "thing:vc:length"
    node_b: "thing:vc:color_luminance"
    weight: 0.70
    affinity: 0.85
    synthesis: "Length + luminance = redundant encoding. Longer bar + darker shade = stronger evidence. Reinforces perception through two independent channels."

  - id: "link:affinity_position_length"
    node_a: "thing:vc:position_common_scale"
    node_b: "thing:vc:length"
    weight: 0.85
    affinity: 0.95
    synthesis: "Position and length on same bar chart are inherently coupled. Common baseline makes position and length the same signal. Maximum reinforcement."

  - id: "link:affinity_proximity_common_region"
    node_a: "thing:vc:proximity"
    node_b: "thing:vc:common_region"
    weight: 0.65
    affinity: 0.80
    synthesis: "Proximity + shared enclosure double-reinforce grouping. Proximate elements inside a common box are unambiguously perceived as a group."

  - id: "link:affinity_hue_shape"
    node_a: "thing:vc:color_hue"
    node_b: "thing:vc:shape"
    weight: 0.55
    affinity: 0.70
    synthesis: "Hue + shape for category encoding = redundant nominal channels. Red circles vs blue squares. Robust to colorblind viewers."

  - id: "link:affinity_bold_size"
    node_a: "thing:vc:font_weight"
    node_b: "thing:vc:font_size"
    weight: 0.60
    affinity: 0.75
    synthesis: "Bold + large = unambiguous typographic hierarchy. Redundant importance signal."

  - id: "link:affinity_luminance_sharpness"
    node_a: "thing:vc:color_luminance"
    node_b: "thing:vc:edge_sharpness"
    weight: 0.60
    affinity: 0.75
    synthesis: "Dark + sharp = certain/primary. Light + blurred = uncertain/secondary. Two intuitive uncertainty channels reinforcing each other."

  - id: "link:affinity_directional_reading"
    node_a: "thing:vc:directional_cues"
    node_b: "thing:vc:reading_direction"
    weight: 0.55
    affinity: 0.70
    synthesis: "Arrows aligned with natural reading flow reinforce scanning path. Arrows against reading direction create useful disruption for emphasis."

  - id: "link:affinity_grid_negative_space"
    node_a: "thing:vc:grid_organic"
    node_b: "thing:vc:negative_space"
    weight: 0.50
    affinity: 0.65
    synthesis: "Grid layout + intentional whitespace = clean, scannable, professional. Mutual reinforcement of structure and breathing room."

  - id: "link:affinity_chrome_avatar"
    node_a: "thing:vc:platform_chrome"
    node_b: "thing:vc:avatar"
    weight: 0.55
    affinity: 0.70
    synthesis: "Platform chrome + avatar form the source credibility duo. Together they set the trust prior before content is processed."

  - id: "link:affinity_numbers_dataviz"
    node_a: "thing:vc:numbers_format"
    node_b: "thing:vc:data_viz_elements"
    weight: 0.60
    affinity: 0.75
    synthesis: "Natural frequency labels on data visualization elements = maximum comprehension. Numbers narrate what the chart shows."

  # =====================================================================
  # FRICTION LINKS (channels that interfere with each other)
  # =====================================================================

  - id: "link:friction_area_saturation"
    node_a: "thing:vc:area"
    node_b: "thing:vc:saturation_magnitude"
    weight: 0.60
    friction: 0.80
    aversion: 0.60
    synthesis: "Area + saturation for magnitude = double compression with conflicting exponents. Viewer cannot disentangle which dimension encodes what. Confusing."

  - id: "link:friction_hue_ordinal"
    node_a: "thing:vc:color_hue"
    node_b: "thing:vc:length"
    weight: 0.45
    friction: 0.50
    synthesis: "Hue (nominal) encoding ordinal data contradicts length (ordinal). Rainbow colormap on bars = false categorical boundaries over continuous hierarchy."

  - id: "link:friction_symmetry_hierarchy"
    node_a: "thing:vc:symmetry"
    node_b: "thing:vc:visual_hierarchy_levels"
    weight: 0.55
    friction: 0.70
    synthesis: "Symmetric layout signals 'no hierarchy' while visual hierarchy levels demand asymmetry. These two signals fight each other."

  - id: "link:friction_faces_position"
    node_a: "thing:vc:human_faces"
    node_b: "thing:vc:spatial_position"
    weight: 0.60
    friction: 0.75
    synthesis: "Faces steal first fixation from the evidence hierarchy position. Mandatory face processing (FFA) competes with position-based data encoding for attention within 5-second window."

  - id: "link:friction_density_scan"
    node_a: "thing:vc:visual_density"
    node_b: "thing:vc:reading_direction"
    weight: 0.55
    friction: 0.65
    synthesis: "High visual density disrupts expected reading patterns. Cluttered layouts prevent Z/F pattern scanning, forcing random fixation sequences."

  - id: "link:friction_caps_speed"
    node_a: "thing:vc:all_caps"
    node_b: "thing:vc:font_size"
    weight: 0.40
    friction: 0.50
    synthesis: "ALL CAPS reduces reading speed by 13-20% (Tinker 1963), fighting the time efficiency that font size hierarchy provides."

  - id: "link:friction_3d_position"
    node_a: "thing:vc:volume"
    node_b: "thing:vc:position_common_scale"
    weight: 0.55
    friction: 0.85
    synthesis: "3D elements destroy common-scale positioning. Perspective distorts the baseline, making the best encoding channel (position) unreliable."

  - id: "link:friction_novelty_strategy"
    node_a: "thing:vc:novelty_surprise"
    node_b: "thing:vc:image_category"
    weight: 0.40
    friction: 0.55
    synthesis: "Novelty disrupts the reading strategy primed by image category. Unexpected element in familiar format breaks the scan pattern."

  - id: "link:friction_engagement_comprehension"
    node_a: "thing:vc:engagement_counts"
    node_b: "thing:vc:cognitive_load"
    weight: 0.50
    friction: 0.60
    synthesis: "High engagement counts prime authority-by-popularity, reducing critical evaluation of cognitive load. Social proof short-circuits analytical processing."
