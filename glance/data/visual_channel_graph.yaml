# Visual Channel Catalog — L3 Graph
# 75+ visual properties as thing nodes in 7 category spaces
# Each channel carries weight (perceptual importance), stability (literature basis),
# energy (GLANCE scoring relevance)
# 2026-03-25

nodes:

  # =====================================================================
  # CATEGORY SPACES
  # =====================================================================

  - id: "space:vc:preattentive"
    name: "Pre-attentive Features (<250ms)"
    node_type: space
    synthesis: "Visual features processed in parallel across the entire visual field before conscious attention. Treisman & Gelade 1980. Flat search slope — popout regardless of set size."
    weight: 0.95
    energy: 0.85
    stability: 0.95
    space_hint: "visual_channel_category"

  - id: "space:vc:encoding"
    name: "Perceptual Encoding Channels (Cleveland & McGill)"
    node_type: space
    synthesis: "Channels through which quantitative information is decoded, ordered by perceptual accuracy. Cleveland & McGill 1984. Stevens power law governs each channel's exponent."
    weight: 1.00
    energy: 0.95
    stability: 0.95
    space_hint: "visual_channel_category"

  - id: "space:vc:social"
    name: "Social / Platform Signals (Feed Chrome)"
    node_type: space
    synthesis: "Signals from platform interface surrounding the GA. Read in first fixation sweep before engaging with content. Part of GLANCE stimulus triplet."
    weight: 0.60
    energy: 0.70
    stability: 0.80
    space_hint: "visual_channel_category"

  - id: "space:vc:typography"
    name: "Typography Signals"
    node_type: space
    synthesis: "Processed during first reading fixation sweep (200-300ms per fixation). Typography communicates before lexical content — visual form of text carries meaning independent of words."
    weight: 0.55
    energy: 0.50
    stability: 0.85
    space_hint: "visual_channel_category"

  - id: "space:vc:image_level"
    name: "Image-Level Signals (Global Scene Categorization)"
    node_type: space
    synthesis: "Global scene properties computed in a single feedforward sweep (~150ms). Oliva & Torralba 2006 spatial envelope. Determines reading strategy before content is processed."
    weight: 0.70
    energy: 0.65
    stability: 0.85
    space_hint: "visual_channel_category"

  - id: "space:vc:layout"
    name: "Layout Signals"
    node_type: space
    synthesis: "Determines reading path — sequence of visual element scanning. In 5-second window, ~15-20 saccades. Layout determines which elements receive fixations and in what order."
    weight: 0.75
    energy: 0.70
    stability: 0.80
    space_hint: "visual_channel_category"

  - id: "space:vc:emotional"
    name: "Emotional / Cognitive Priming Signals"
    node_type: space
    synthesis: "Set emotional and cognitive context for data interpretation. Operate through associative priming — activating semantic networks that bias interpretation. Do not encode data directly."
    weight: 0.55
    energy: 0.60
    stability: 0.75
    space_hint: "visual_channel_category"

  - id: "space:vc:compound"
    name: "Compound / Emergent Signals"
    node_type: space
    synthesis: "Higher-order perceptions emerging from combinations of lower-level features. Computed by the brain's scene understanding system. Not reducible to a single channel."
    weight: 0.65
    energy: 0.55
    stability: 0.70
    space_hint: "visual_channel_category"

  # =====================================================================
  # 1. PRE-ATTENTIVE FEATURES
  # =====================================================================

  # --- 1.1 Color ---

  - id: "thing:vc:color_hue"
    name: "Color Hue"
    node_type: thing
    synthesis: "Category membership, grouping, semantic associations. Pre-attentive popout. Red element among blue detected in constant time. NOT ordinal — no natural more/less along hue dimension."
    weight: 0.60
    energy: 0.75
    stability: 0.95
    content: "Treisman & Gelade 1980. Misuse of hue for ordinal data (rainbow colormaps) creates false categorical boundaries. GLANCE coverage: PARTIAL (V14 distinguishability only)."

  - id: "thing:vc:color_saturation"
    name: "Color Saturation"
    node_type: thing
    synthesis: "Perceived as intensity/importance by naive viewers. Poor channel for encoding magnitude (MacEachren 2012). Kinkeldey 2017 recommends against for uncertainty."
    weight: 0.30
    energy: 0.70
    stability: 0.90
    content: "Stevens exponent poorly characterized. High inter-individual variance. GLANCE coverage: YES (P34)."

  - id: "thing:vc:color_luminance"
    name: "Color Luminance (Lightness/Value)"
    node_type: thing
    synthesis: "Magnitude, weight, certainty. Most intuitive channel for uncertainty: dark=certain, light=uncertain (MacEachren 2012). Fastest color dimension — magnocellular pathway."
    weight: 0.70
    energy: 0.80
    stability: 0.90
    content: "Recommended primary channel for encoding evidence certainty in VEC. GLANCE coverage: PARTIAL (VEC design uses it, no pattern registry entry)."

  # --- 1.2 Form ---

  - id: "thing:vc:orientation"
    name: "Orientation (Tilt/Angle)"
    node_type: thing
    synthesis: "Direction, trend. 15-20 degree differences detected pre-attentively (Wolfe 1994). Relevant for trend perception in line charts within GAs."
    weight: 0.40
    energy: 0.30
    stability: 0.90
    content: "GLANCE coverage: NO."

  - id: "thing:vc:size"
    name: "Size (Length, Width, Area)"
    node_type: thing
    synthesis: "Magnitude, importance, hierarchy. Stevens power law: beta ~0.7 for area, ~1.0 for length. Pre-attentive for >2:1 ratio. Core to P21 and P32."
    weight: 0.90
    energy: 0.90
    stability: 0.95
    content: "GLANCE coverage: YES (P21 area, P32 length)."

  - id: "thing:vc:shape"
    name: "Shape"
    node_type: thing
    synthesis: "Category membership (nominal only). Circle vs square vs triangle = different types. Not suitable for ordinal or quantitative data."
    weight: 0.35
    energy: 0.40
    stability: 0.90
    content: "Pre-attentive for simple differences. Complex shapes require attentive processing (~500ms). GLANCE coverage: NO."

  - id: "thing:vc:curvature"
    name: "Curvature"
    node_type: thing
    synthesis: "Organic vs geometric, natural vs artificial. Curved=softer, straight=rigid. Low direct relevance to evidence encoding."
    weight: 0.20
    energy: 0.15
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:line_termination"
    name: "Line Termination / Intersection"
    node_type: thing
    synthesis: "Connectivity, continuation, boundary. Abrupt end = separation; connection = relationship. Julesz & Bergen 1983."
    weight: 0.25
    energy: 0.20
    stability: 0.85
    content: "Relevant to flowchart/pathway GAs. GLANCE coverage: NO."

  - id: "thing:vc:closure"
    name: "Closure (Enclosure)"
    node_type: thing
    synthesis: "Grouping, containment, boundary. Gestalt law of closure. Enclosed elements perceived as belonging together. Creates implicit hierarchies in GAs."
    weight: 0.45
    energy: 0.45
    stability: 0.90
    content: "GLANCE coverage: NO."

  # --- 1.3 Motion and Temporal ---

  - id: "thing:vc:motion"
    name: "Motion (Direction, Velocity)"
    node_type: thing
    synthesis: "Change, urgency, direction. Pre-attentive <100ms. Not applicable to static GAs. Relevant to animated GAs and scroll arrest in feeds. Abrams & Christ 2003."
    weight: 0.50
    energy: 0.35
    stability: 0.85
    content: "Kale 2019: HOPs improve uncertainty perception. GLANCE coverage: NO (stream captures dwell time, not scroll arrest ability)."

  - id: "thing:vc:flicker_onset"
    name: "Flicker / Onset"
    node_type: thing
    synthesis: "Novelty, change, alert. Abrupt onset captures attention involuntarily. One of strongest attention-capture signals. Yantis & Jonides 1984."
    weight: 0.45
    energy: 0.50
    stability: 0.90
    content: "First 100ms of visibility determines scroll arrest. Relevant to S10. GLANCE coverage: PARTIAL."

  - id: "thing:vc:stereo_depth"
    name: "Stereo Depth / Binocular Disparity"
    node_type: thing
    synthesis: "Layering, depth, figure-ground. Not applicable to 2D screen viewing of GAs. Irrelevant to GLANCE."
    weight: 0.10
    energy: 0.05
    stability: 0.85
    content: "GLANCE coverage: N/A."

  # --- 1.4 Spatial Position and Grouping ---

  - id: "thing:vc:spatial_position"
    name: "Spatial Position (x, y)"
    node_type: thing
    synthesis: "Most accurate encoding channel for quantitative data (Cleveland & McGill rank 1). Beta ~1.0 on common aligned scale. Gold standard for evidence hierarchy."
    weight: 1.00
    energy: 0.95
    stability: 0.95
    content: "GLANCE coverage: PARTIAL (VEC uses it, absence not flagged as risk)."

  - id: "thing:vc:proximity"
    name: "Proximity (Gestalt)"
    node_type: thing
    synthesis: "Grouping, relatedness. Elements close together perceived as same group (Wertheimer 1923). Automatic, cannot be suppressed."
    weight: 0.55
    energy: 0.55
    stability: 0.95
    content: "GLANCE coverage: NO."

  - id: "thing:vc:similarity"
    name: "Similarity (Gestalt)"
    node_type: thing
    synthesis: "Category membership via shared visual features. Products with similar visual treatment perceived as equivalent. Can contradict hierarchy signal."
    weight: 0.50
    energy: 0.55
    stability: 0.95
    content: "GLANCE coverage: PARTIAL (V14 catches one instance, general false grouping not assessed)."

  - id: "thing:vc:continuity"
    name: "Continuity (Gestalt)"
    node_type: thing
    synthesis: "Connection, flow, sequence. Elements along smooth path perceived as continuous group (Wertheimer 1923). Relevant to pathway/mechanism diagrams."
    weight: 0.35
    energy: 0.30
    stability: 0.95
    content: "GLANCE coverage: NO."

  - id: "thing:vc:common_region"
    name: "Common Region (Gestalt, Palmer 1992)"
    node_type: thing
    synthesis: "Grouping by shared enclosure. Elements within common boundary perceived as unit, overriding proximity. Design tool for VEC deliberate grouping."
    weight: 0.50
    energy: 0.50
    stability: 0.90
    content: "GLANCE coverage: NO."

  - id: "thing:vc:connectedness"
    name: "Connectedness (Gestalt, Palmer & Rock 1994)"
    node_type: thing
    synthesis: "Relationship, dependency. Connected elements perceived as more related than merely proximate. Connecting lines create causal perception."
    weight: 0.50
    energy: 0.45
    stability: 0.90
    content: "GLANCE coverage: NO."

  - id: "thing:vc:figure_ground"
    name: "Figure-Ground Segregation"
    node_type: thing
    synthesis: "Subject vs background. Smaller, enclosed, symmetrical, higher-contrast regions assigned figure status. If key message has low contrast, fails before content is processed."
    weight: 0.75
    energy: 0.70
    stability: 0.95
    content: "GLANCE coverage: NO. Gap: figure-ground contrast ratio not measured."

  # =====================================================================
  # 2. PERCEPTUAL ENCODING CHANNELS (Cleveland & McGill)
  # =====================================================================

  - id: "thing:vc:position_common_scale"
    name: "Position on Common Aligned Scale"
    node_type: thing
    synthesis: "Highest accuracy magnitude encoding. Beta ~1.0 (near-perfect linearity). Optimal for evidence hierarchy. Cleveland & McGill 1984 rank 1."
    weight: 1.00
    energy: 0.95
    stability: 0.95
    content: "GLANCE coverage: YES (P32 recommends length/position). VEC bars use common baseline."

  - id: "thing:vc:position_nonaligned"
    name: "Position on Non-Aligned Scales"
    node_type: thing
    synthesis: "Magnitude comparison requiring memory of one value while looking at the other. 10-20% less accurate than aligned (Cleveland & McGill 1984, exp 2). Beta ~0.95-1.0."
    weight: 0.80
    energy: 0.60
    stability: 0.90
    content: "Multi-panel GAs force non-aligned comparison, degrading S9b. GLANCE coverage: NO."

  - id: "thing:vc:length"
    name: "Length"
    node_type: thing
    synthesis: "Magnitude via extent in one dimension. Beta ~1.0 (near-linear). Bar charts, evidence bars. VEC primary encoding channel."
    weight: 0.95
    energy: 0.95
    stability: 0.95
    content: "Pattern P32. GLANCE coverage: YES."

  - id: "thing:vc:angle_slope"
    name: "Angle / Slope"
    node_type: thing
    synthesis: "Rate of change, trend. Beta ~0.85. Pie chart slices force angle decoding — perceptually inferior. Oblique effect: 0/90/180 more accurate."
    weight: 0.55
    energy: 0.50
    stability: 0.90
    content: "Pie chart use not flagged as risk despite being known inferior encoding. GLANCE coverage: NO."

  - id: "thing:vc:area"
    name: "Area"
    node_type: thing
    synthesis: "Magnitude via 2D extent. Beta ~0.7. 10x area perceived as ~5x. Systematic underestimation. Central risk pattern P21."
    weight: 0.65
    energy: 0.85
    stability: 0.95
    content: "IEEE TVCG 2021 illusion de la moyenne pondérée. GLANCE coverage: YES (P21)."

  - id: "thing:vc:volume"
    name: "Volume (3D)"
    node_type: thing
    synthesis: "Magnitude via 3D extent. Beta ~0.6. Worst quantitative channel. Universally condemned (Tufte 1983, Few 2004). ~40% perceptual compression."
    weight: 0.40
    energy: 0.65
    stability: 0.95
    content: "Visual spin by design choice. GLANCE coverage: NO. HIGH risk gap."

  - id: "thing:vc:saturation_magnitude"
    name: "Color Saturation (for Magnitude)"
    node_type: thing
    synthesis: "Intended for magnitude but NOT intuitive (MacEachren 2012). Kinkeldey 2017: do not use for uncertainty. High inter-individual variance."
    weight: 0.30
    energy: 0.70
    stability: 0.90
    content: "Pattern P34 risk. GLANCE coverage: YES."

  - id: "thing:vc:hue_categories"
    name: "Color Hue (for Categories)"
    node_type: thing
    synthesis: "Nominal categories only. NOT ordinal. Rainbow colormap for continuous variables creates false categorical boundaries. Correct: different hues for different products."
    weight: 0.50
    energy: 0.65
    stability: 0.90
    content: "GLANCE coverage: PARTIAL (V14 distinguishability only, rainbow misuse not flagged)."

  - id: "thing:vc:texture_density"
    name: "Texture / Pattern Density"
    node_type: thing
    synthesis: "Category, density, roughness. Hatching for categories without color (accessible). Julesz 1981 texture boundary detection pre-attentive."
    weight: 0.25
    energy: 0.20
    stability: 0.85
    content: "Potentially useful as redundant channel for accessibility. GLANCE coverage: NO."

  # =====================================================================
  # 3. SOCIAL / PLATFORM SIGNALS
  # =====================================================================

  - id: "thing:vc:avatar"
    name: "Avatar Image"
    node_type: thing
    synthesis: "Authority, gender, age, affiliation. Face processing ~170ms via FFA. Institutional logo vs personal photo. Anchors credibility before GA content."
    weight: 0.55
    energy: 0.60
    stability: 0.85
    content: "GLANCE coverage: PARTIAL (included in chrome, effect on S9b/S10 not isolated)."

  - id: "thing:vc:username"
    name: "Username / Handle / Institutional Name"
    node_type: thing
    synthesis: "Source authority. 'The Lancet' vs '@science_fan_42' triggers different credibility priors. Part of stimulus_text in GLANCE stream mode."
    weight: 0.50
    energy: 0.55
    stability: 0.80
    content: "Potential confound: authority bias inflates S9b. GLANCE coverage: PARTIAL."

  - id: "thing:vc:verified_badge"
    name: "Verified Badge"
    node_type: thing
    synthesis: "Institutional validation, authenticity. Blue checkmark = platform-verified identity. Small, high-contrast symbol in predictable location."
    weight: 0.30
    energy: 0.35
    stability: 0.75
    content: "May inflate perceived credibility. GLANCE coverage: NO."

  - id: "thing:vc:timestamp"
    name: "Timestamp / Recency"
    node_type: thing
    synthesis: "Relevance, freshness. Recency bias: recent content perceived as more valid. 2h ago = relevant, 2 years ago = outdated."
    weight: 0.25
    energy: 0.30
    stability: 0.80
    content: "Not controlled in GLANCE feed simulation. GLANCE coverage: NO."

  - id: "thing:vc:engagement_counts"
    name: "Engagement Counts (Likes, Shares, Comments, Views)"
    node_type: thing
    synthesis: "Social proof. High numbers = 'many found this valuable.' Cialdini 2001: overrides personal judgment. Most powerful cognitive bias in uncertain situations."
    weight: 0.60
    energy: 0.70
    stability: 0.85
    content: "GA with 2,847 likes vs 3 likes produces different S9b — engagement-comprehension gap itself. GLANCE coverage: PARTIAL."

  - id: "thing:vc:platform_chrome"
    name: "Platform Chrome Identity"
    node_type: thing
    synthesis: "Context, expected content type. LinkedIn=professional, Twitter/X=rapid, Journal TOC=academic. Primes different reading strategies. Central to GLANCE design."
    weight: 0.65
    energy: 0.80
    stability: 0.85
    content: "Controlled independent variable in GLANCE. Stimulus triplet models platform chrome. GLANCE coverage: YES."

  - id: "thing:vc:post_type"
    name: "Post Type Indicators"
    node_type: thing
    synthesis: "Content category. Article vs Shared vs Sponsored. Engagement probability drops sharply for Sponsored. Affects dwell time."
    weight: 0.35
    energy: 0.35
    stability: 0.75
    content: "GLANCE coverage: PARTIAL."

  - id: "thing:vc:post_text_length"
    name: "Post Text Length"
    node_type: thing
    synthesis: "Effort to read, complexity. Wall of text triggers scroll-past. Short text signals quick read. 3-line rule on LinkedIn. Controlled in GLANCE stimulus_text."
    weight: 0.45
    energy: 0.55
    stability: 0.80
    content: "Nude vs title-only conditions isolate text effects. GLANCE coverage: YES."

  - id: "thing:vc:comment_thread"
    name: "Reply/Comment Thread Indicators"
    node_type: thing
    synthesis: "Engagement depth, controversy. Many comments signal debate. Comment counts as social proof. Low direct relevance to S9b."
    weight: 0.20
    energy: 0.20
    stability: 0.70
    content: "GLANCE coverage: NO."

  # =====================================================================
  # 4. TYPOGRAPHY SIGNALS
  # =====================================================================

  - id: "thing:vc:font_weight"
    name: "Font Weight (Bold vs Regular vs Light)"
    node_type: thing
    synthesis: "Importance hierarchy. Bold=primary, Regular=body, Light=secondary. Bold labels draw fixation first. Decorative bold wastes attention."
    weight: 0.50
    energy: 0.45
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:font_size"
    name: "Font Size Hierarchy"
    node_type: thing
    synthesis: "Information hierarchy via relative size. Brain builds reading priority queue from size differences. Uniform sizes force slow linear reading."
    weight: 0.55
    energy: 0.50
    stability: 0.85
    content: "Uniform size wastes 5-second window. GLANCE coverage: PARTIAL (V3 captures density, not hierarchy)."

  - id: "thing:vc:font_family"
    name: "Font Family"
    node_type: thing
    synthesis: "Genre, authority, formality. Serif=academic, Sans-serif=modern, Monospace=technical, Script=informal. Decorative fonts reduce perceived authority."
    weight: 0.30
    energy: 0.25
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:all_caps"
    name: "ALL CAPS"
    node_type: thing
    synthesis: "Shouting, warning, emphasis. Creates distinct rectangular block. Reading 13-20% slower than mixed case (Tinker 1963). Paradoxically may reduce S9b."
    weight: 0.30
    energy: 0.30
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:text_color"
    name: "Text Color"
    node_type: thing
    synthesis: "Semantic role via convention. Blue=link, Red=alert, Green=success, Gray=secondary. Decades of UI design conventions. Red for strong evidence fights the brain."
    weight: 0.45
    energy: 0.45
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:text_alignment"
    name: "Text Alignment"
    node_type: thing
    synthesis: "Structure, professionalism. Left-aligned supports rapid scanning (consistent left margin). Center-aligned body text slows scanning (varying x)."
    weight: 0.30
    energy: 0.25
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:line_spacing"
    name: "Line Spacing / Leading"
    node_type: thing
    synthesis: "Readability, density. Tight=dense/overwhelming, Generous=airy/inviting. Cramped text signals too much information."
    weight: 0.30
    energy: 0.30
    stability: 0.80
    content: "GLANCE coverage: PARTIAL (V3 word count, leading not assessed)."

  - id: "thing:vc:text_contrast"
    name: "Text Contrast Ratio"
    node_type: thing
    synthesis: "Readability, importance. WCAG 2.1: 4.5:1 for normal text, 3:1 for large. Low contrast labels not read within 5 seconds at mobile scale."
    weight: 0.55
    energy: 0.55
    stability: 0.90
    content: "GLANCE coverage: PARTIAL (V7 readability, contrast not separately measured)."

  # =====================================================================
  # 5. IMAGE-LEVEL SIGNALS
  # =====================================================================

  - id: "thing:vc:image_category"
    name: "Image Category (Photo/Illustration/Chart/Diagram/Infographic)"
    node_type: thing
    synthesis: "Content type determining reading strategy. Thorpe 1996: categorized within ~300ms. Chart primes quantitative; illustration primes narrative. Mismatch = wrong strategy."
    weight: 0.60
    energy: 0.60
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:palette_temperature"
    name: "Color Palette Temperature"
    node_type: thing
    synthesis: "Emotional tone. Warm=urgency/energy, Cool=calm/trust/clinical, Neutral=technical/serious. Affects credibility before content is read."
    weight: 0.45
    energy: 0.50
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:visual_density"
    name: "Visual Density / Whitespace Ratio"
    node_type: thing
    synthesis: "Complexity, effort required. >80% filled=overloaded, 40-60%=scannable, <30%=empty. Overloaded GAs lower S9a/S9b. Includes non-text elements."
    weight: 0.65
    energy: 0.70
    stability: 0.85
    content: "GLANCE coverage: PARTIAL (V3 text density, total visual density not measured)."

  - id: "thing:vc:symmetry"
    name: "Symmetry / Asymmetry"
    node_type: thing
    synthesis: "Order/stability (symmetry) vs hierarchy/editorial (asymmetry). Symmetric = no hierarchy. Asymmetric = visual hierarchy guiding eye. Wagemans 1997."
    weight: 0.45
    energy: 0.50
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:professional_markers"
    name: "Professional vs Amateur Style Markers"
    node_type: thing
    synthesis: "Source credibility, production quality. Professional: consistent palette, grid alignment, typographic hierarchy, vectors. Amateur: misaligned, raster artifacts, clip art."
    weight: 0.50
    energy: 0.55
    stability: 0.80
    content: "Primes trust, potentially inflating S9b via authority heuristic. GLANCE coverage: NO."

  - id: "thing:vc:resolution"
    name: "Resolution / Rendering Quality"
    node_type: thing
    synthesis: "Production quality, platform fit. Vector=professional/scalable. Low-res raster=amateur. PDF-to-JPEG artifacts common in GAs."
    weight: 0.40
    energy: 0.40
    stability: 0.80
    content: "At mobile scale (V7), determines label legibility. GLANCE coverage: PARTIAL."

  - id: "thing:vc:aspect_ratio"
    name: "Aspect Ratio"
    node_type: thing
    synthesis: "Platform convention. 1:1=Instagram, 16:9=Twitter, 2:3=TOC. Non-standard ratios signal platform mismatch. Crop behavior varies by platform."
    weight: 0.40
    energy: 0.45
    stability: 0.80
    content: "GLANCE captures width but not ratio or crop behavior. GLANCE coverage: PARTIAL."

  - id: "thing:vc:edge_sharpness"
    name: "Edge Sharpness / Blur"
    node_type: thing
    synthesis: "Focus, certainty. Sharp=figure/important/certain. Blur=background/uncertain. MacEachren 2012: most intuitive uncertainty signal (but binary only)."
    weight: 0.55
    energy: 0.55
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:border_frame"
    name: "Presence of Border / Frame"
    node_type: thing
    synthesis: "Containment, completeness. Bordered=defined unit. Platform chrome provides frame in stream mode; nude mode relies on GA boundary."
    weight: 0.35
    energy: 0.40
    stability: 0.80
    content: "Stimulus triplet models frame presence/absence. GLANCE coverage: YES."

  # =====================================================================
  # 6. LAYOUT SIGNALS
  # =====================================================================

  - id: "thing:vc:visual_weight_dist"
    name: "Visual Weight Distribution"
    node_type: thing
    synthesis: "Hierarchy, emphasis, balance. Top-heavy follows Western convention. Evidence hierarchy should be where eye naturally lands first (top-left)."
    weight: 0.60
    energy: 0.60
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:reading_direction"
    name: "Reading Direction Flow"
    node_type: thing
    synthesis: "Scanning order. Z-pattern for images, F-pattern for text (Nielsen 2006). If layout fights expected pattern, critical elements missed."
    weight: 0.60
    energy: 0.60
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:grid_organic"
    name: "Grid vs Organic Layout"
    node_type: thing
    synthesis: "Structure, predictability. Grid=organized/fast comparison. Organic=narrative/flowing. Grid supports faster comparison at predictable positions."
    weight: 0.50
    energy: 0.50
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:negative_space"
    name: "Negative Space (Intentional Emptiness)"
    node_type: thing
    synthesis: "Emphasis by isolation, sophistication. Element surrounded by space receives more attention. Strategic around key evidence bar = pop-out."
    weight: 0.55
    energy: 0.55
    stability: 0.80
    content: "GLANCE coverage: PARTIAL (V3 density indirect)."

  - id: "thing:vc:visual_hierarchy_levels"
    name: "Visual Hierarchy (Number of Levels)"
    node_type: thing
    synthesis: "Complexity of information structure. 2-3 levels scannable in 5 seconds. 5+ levels overwhelm viewer. Fundamental constraint on GA complexity."
    weight: 0.65
    energy: 0.65
    stability: 0.80
    content: "GLANCE coverage: NO."

  - id: "thing:vc:directional_cues"
    name: "Directional Cues (Arrows, Lines, Gaze Direction)"
    node_type: thing
    synthesis: "Flow, sequence, causation. Arrows = strongest attention-directing signals. Human gaze in photos directs viewer gaze (Driver 1999)."
    weight: 0.55
    energy: 0.55
    stability: 0.85
    content: "GLANCE coverage: NO."

  # =====================================================================
  # 7. EMOTIONAL / COGNITIVE PRIMING SIGNALS
  # =====================================================================

  - id: "thing:vc:human_faces"
    name: "Human Faces"
    node_type: thing
    synthesis: "Mandatory attention capture. FFA ~170ms. Cannot be suppressed. Even schematic faces activate processing. Captures first fixation regardless of evidence placement."
    weight: 0.70
    energy: 0.75
    stability: 0.95
    content: "Beneficial for S10 (draws to GA), harmful for S9b (steals fixation from evidence). HIGH risk gap. GLANCE coverage: NO."

  - id: "thing:vc:medical_imagery"
    name: "Medical / Anatomical Imagery"
    node_type: thing
    synthesis: "Clinical context, seriousness. Primes medical interpretation frame. Visceral imagery triggers empathetic/aversive responses. Flashbulb memory effect boosts S9a."
    weight: 0.50
    energy: 0.55
    stability: 0.80
    content: "May bias S9b via 'this is serious' regardless of evidence strength. GLANCE coverage: NO."

  - id: "thing:vc:data_viz_elements"
    name: "Data Visualization Elements (Charts, Tables, Numbers)"
    node_type: thing
    synthesis: "Quantitative rigor signal. Presence of visible axes/bars/numbers primes analytical processing. Decorative data-ink misleads (Tufte)."
    weight: 0.55
    energy: 0.55
    stability: 0.85
    content: "GLANCE coverage: PARTIAL (VEC emphasizes meaningful encoding, decorative not flagged)."

  - id: "thing:vc:color_emotion"
    name: "Color-Emotion Associations"
    node_type: thing
    synthesis: "Emotional valence and arousal via learned associations. Elliot & Maier 2014. Red=urgency/arousal, Blue=trust/calm, Green=safety, Yellow=warning. Unintentional spin via palette."
    weight: 0.50
    energy: 0.55
    stability: 0.85
    content: "GLANCE coverage: NO."

  - id: "thing:vc:muted_saturated"
    name: "Muted vs Saturated Palette"
    node_type: thing
    synthesis: "Sophistication/trust (muted) vs energy/attention (saturated). High-sat=marketing. Muted=scientific journals. BioRender-style high-sat signals engagement-over-evidence."
    weight: 0.40
    energy: 0.45
    stability: 0.75
    content: "GLANCE coverage: NO."

  - id: "thing:vc:icons"
    name: "Icons and Pictograms"
    node_type: thing
    synthesis: "Category/action/concept via cultural symbols. Faster than text for common concepts. Zikmund-Fisher 2014: person-icons increase perceived risk vs abstract shapes."
    weight: 0.40
    energy: 0.45
    stability: 0.80
    content: "Child pictogram (B7) primes pediatric context. GLANCE coverage: NO."

  - id: "thing:vc:numbers_format"
    name: "Numbers and Numerical Format"
    node_type: thing
    synthesis: "Precision, magnitude. Natural frequencies (18 of 20) comprehended by >80% vs <50% for probabilistic. Gigerenzer; Garcia-Retamero & Cokely 2017. SNARC effect."
    weight: 0.60
    energy: 0.65
    stability: 0.90
    content: "Pattern P33. GLANCE coverage: PARTIAL (VEC principle, GA compliance not assessed)."

  - id: "thing:vc:branding"
    name: "Branding / Logo Presence"
    node_type: thing
    synthesis: "Source identity, commercial vs academic intent. Journal logo=authority, Pharma logo=bias, Design tool logo=production method. Within-GA branding not controlled."
    weight: 0.40
    energy: 0.45
    stability: 0.80
    content: "GLANCE coverage: PARTIAL (chrome branding, not within-GA)."

  - id: "thing:vc:novelty_surprise"
    name: "Novelty / Surprise / Incongruity"
    node_type: thing
    synthesis: "Unexpected elements capture attention involuntarily. Itti & Baldi 2009 Bayesian surprise. May boost S10 but disrupt reading strategy, reducing S9b."
    weight: 0.40
    energy: 0.45
    stability: 0.75
    content: "GLANCE coverage: NO."

  # =====================================================================
  # 8. COMPOUND / EMERGENT SIGNALS
  # =====================================================================

  - id: "thing:vc:info_noise_ratio"
    name: "Information-to-Noise Ratio (Visual SNR)"
    node_type: thing
    synthesis: "Data-ink ratio (Tufte). Proportion of visual content carrying meaning vs decoration. High noise reduces probability of evidence hierarchy perception in 5 seconds."
    weight: 0.70
    energy: 0.65
    stability: 0.85
    content: "Compound effect of density, whitespace, decoration. GLANCE coverage: PARTIAL (V3 text density only)."

  - id: "thing:vc:narrative_structure"
    name: "Perceived Narrative Structure"
    node_type: thing
    synthesis: "Story vs disconnected elements. Brain seeks narrative (cause-effect, problem-solution). GAs with clear visual narrative support both recall (S9a) and hierarchy (S9b). Schank 1990."
    weight: 0.55
    energy: 0.50
    stability: 0.75
    content: "GLANCE coverage: NO."

  - id: "thing:vc:cognitive_load"
    name: "Cognitive Load Estimate"
    node_type: thing
    synthesis: "Integrative variable. Brain estimates in first 500ms from complexity. High load in feed = scroll past. Predicts S10, S9a, S9b, S9c. All VEC principles ultimately reduce this."
    weight: 0.80
    energy: 0.75
    stability: 0.80
    content: "GLANCE coverage: PARTIAL (V3, V7 are individual contributors)."

  - id: "thing:vc:credibility_gestalt"
    name: "Credibility Gestalt"
    node_type: thing
    synthesis: "Integrates production quality, source authority, palette sophistication, typography, data viz presence, absence of marketing signals. Affects S9c directly."
    weight: 0.65
    energy: 0.60
    stability: 0.75
    content: "GLANCE coverage: NO."

  - id: "thing:vc:aesthetic_appeal"
    name: "Aesthetic Appeal"
    node_type: thing
    synthesis: "Beauty increases dwell time, sharing, perceived credibility (Tractinsky 2000). Stabilizes within 500ms (Lindgaard 2006). Engagement-comprehension dissociation: beauty ≠ accuracy."
    weight: 0.55
    energy: 0.55
    stability: 0.80
    content: "Beautiful GA may score high S10 + S9c but low S9b. Potential confound. GLANCE coverage: NO."

