# Oregon Health Insurance Experiment — Bar Chart GA (L3 Graph)
# Finkelstein et al. 2012, QJE — Medicaid coverage effects
# Mix of positive and negative effects — tests directional encoding
# Channel: LENGTH (Stevens beta = 1.0)
# Created: 2026-03-25

nodes:

  # THINGS — the 4 health outcomes
  - id: "thing:emergency_visits"
    name: "Emergency Visits (+40%)"
    node_type: thing
    synthesis: >
      Medicaid coverage INCREASED emergency department visits by 40%.
      Counterintuitive result — insurance was expected to reduce ER use.
      Positive bar extending RIGHT from baseline. Unintended consequence.
    weight: 0.85
    energy: 0.20
    stability: 0.85
    hierarchy: 0.70
    trust: 0.90
    valence: -0.5
    permanence: 1.0
    ambivalence: 0.3
    content: "Effect: +40% increase in ER visits. Bar extends right. Color: amber (#F59E0B) — ambiguous outcome."

  - id: "thing:depression_screening"
    name: "Depression Screening (+30%)"
    node_type: thing
    synthesis: >
      Medicaid coverage increased depression screening by 30%. The
      LARGEST clearly positive effect. More screening = more detection
      = better mental health outcomes. The correct answer for S9b.
    weight: 1.0
    energy: 0.0
    stability: 0.90
    hierarchy: 1.0
    trust: 0.90
    valence: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: "Effect: +30% depression screening. Bar extends right. Color: green (#10B981) — positive outcome."

  - id: "thing:financial_strain"
    name: "Financial Strain (-25%)"
    node_type: thing
    synthesis: >
      Medicaid coverage REDUCED financial strain by 25%. Fewer
      catastrophic medical expenses. Bar extends LEFT from baseline
      (reduction). Positive outcome encoded as negative direction.
    weight: 0.80
    energy: 0.10
    stability: 0.85
    hierarchy: 0.80
    trust: 0.85
    valence: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: "Effect: -25% financial strain. Bar extends left (decrease). Color: green (#10B981) — positive outcome."

  - id: "thing:physical_health"
    name: "Physical Health (~0%)"
    node_type: thing
    synthesis: >
      Medicaid coverage showed NO significant improvement in physical
      health measures (blood pressure, cholesterol, HbA1c). The null
      result. Shortest bar — near zero. The surprising negative finding.
    weight: 0.70
    energy: 0.30
    stability: 0.80
    hierarchy: 0.10
    trust: 0.85
    valence: 0.0
    permanence: 1.0
    ambivalence: 0.5
    content: "Effect: ~0% (not significant). Near-zero bar. Color: gray (#9CA3AF) — null result."

  # NARRATIVE — the policy story
  - id: "narrative:medicaid_impact"
    name: "Medicaid Mixed Impact"
    node_type: narrative
    synthesis: >
      The Oregon experiment revealed that Medicaid coverage has MIXED
      effects: strong positive impact on mental health and financial
      protection, but NO effect on physical health outcomes and
      INCREASED ER utilization. This challenges the simple narrative
      that insurance = better health. Bar chart with bidirectional
      bars encodes both positive and negative effects.
    weight: 0.95
    energy: 0.15
    stability: 0.85
    permanence: 1.0
    ambivalence: 0.3
    content: "The key insight: insurance helps mental health and finances, not physical health. Directional encoding critical."

  # MOMENT — the study
  - id: "moment:finkelstein_2012"
    name: "Finkelstein et al. 2012 (QJE)"
    node_type: moment
    synthesis: >
      Oregon Health Insurance Experiment. Natural experiment — lottery-based
      Medicaid expansion. Gold-standard causal evidence. Published in
      Quarterly Journal of Economics. N~10,000.
    weight: 0.90
    energy: 0.05
    stability: 0.95
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0

  # SPACE — the chart domain
  - id: "space:medicaid_effects"
    name: "Medicaid Effects Domain"
    node_type: space
    synthesis: >
      Health and financial outcomes of Medicaid coverage. Bidirectional
      bar chart: bars extend left (decrease) or right (increase) from
      a central baseline. Length encodes effect SIZE, direction encodes
      effect SIGN.
    weight: 0.70
    energy: 0.10
    stability: 0.85
    permanence: 1.0
    ambivalence: 0.0

links:

  # Outcomes → narrative
  - id: "link:emergency_to_narrative"
    node_a: "thing:emergency_visits"
    node_b: "narrative:medicaid_impact"
    weight: 0.85
    hierarchy: 0.70
    valence: -0.5
    trust: 0.90
    synthesis: "ER visits increase is the counterintuitive finding in the Medicaid story."

  - id: "link:depression_to_narrative"
    node_a: "thing:depression_screening"
    node_b: "narrative:medicaid_impact"
    weight: 0.95
    hierarchy: 1.0
    valence: 1.0
    trust: 0.90
    synthesis: "Depression screening is the strongest positive finding."

  - id: "link:financial_to_narrative"
    node_a: "thing:financial_strain"
    node_b: "narrative:medicaid_impact"
    weight: 0.80
    hierarchy: 0.80
    valence: 1.0
    trust: 0.85
    synthesis: "Financial strain reduction is the clearest economic benefit."

  - id: "link:physical_to_narrative"
    node_a: "thing:physical_health"
    node_b: "narrative:medicaid_impact"
    weight: 0.70
    hierarchy: -0.80
    valence: 0.0
    trust: 0.85
    synthesis: "Physical health null result is the most challenging finding."

  # Hierarchy between outcomes
  - id: "link:depression_to_emergency"
    node_a: "thing:depression_screening"
    node_b: "thing:emergency_visits"
    weight: 0.80
    hierarchy: 0.30
    synthesis: "Depression screening > Emergency visits in terms of clear benefit."

  - id: "link:financial_to_physical"
    node_a: "thing:financial_strain"
    node_b: "thing:physical_health"
    weight: 0.70
    hierarchy: 0.70
    synthesis: "Financial strain reduction > Physical health null result."

  # Evidence
  - id: "link:finkelstein_to_narrative"
    node_a: "moment:finkelstein_2012"
    node_b: "narrative:medicaid_impact"
    weight: 0.90
    trust: 0.95
    synthesis: "Finkelstein 2012 is the source of all effect size data."

  # Domain containment
  - id: "link:domain_to_emergency"
    node_a: "space:medicaid_effects"
    node_b: "thing:emergency_visits"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Domain contains Emergency visits outcome."

  - id: "link:domain_to_depression"
    node_a: "space:medicaid_effects"
    node_b: "thing:depression_screening"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Domain contains Depression screening outcome."

  - id: "link:domain_to_financial"
    node_a: "space:medicaid_effects"
    node_b: "thing:financial_strain"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Domain contains Financial strain outcome."

  - id: "link:domain_to_physical"
    node_a: "space:medicaid_effects"
    node_b: "thing:physical_health"
    hierarchy: -1.0
    permanence: 1.0
    synthesis: "Domain contains Physical health outcome."

# VISUAL CHANNEL SCORING
# Primary: LENGTH (Stevens beta=1.0) — bidirectional bar chart
# Secondary: DIRECTION — left=decrease, right=increase (encodes sign)
# Tertiary: COLOR_HUE — green=positive, amber=ambiguous, gray=null
# Tests: directional encoding (mix of positive/negative effects)
# Expected: moderate-high score. The null result (physical health)
# and the counterintuitive result (ER visits) add ambivalence —
# more tension than a simple "everything positive" chart.
