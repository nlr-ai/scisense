# Immunomodulator GA — L3 Information Graph
# V2A "Bronche Vivante" — MDPI Children paper
# "Briser le Cercle Vicieux des Infections Respiratoires Pédiatriques"
# 30+ nodes, 40+ links — every visible information vector mapped
# Created: 2026-03-25

# =============================================================================
# NODES
# =============================================================================

nodes:

  # ---------------------------------------------------------------------------
  # SPACES — the three visual zones + central anatomical structure
  # ---------------------------------------------------------------------------

  - id: "space:immuno:zone_sick"
    name: "Zone Malade (gauche)"
    node_type: space
    synthesis: >
      Left zone of the GA. Contains sick child pictogram, vicious cycle
      diagram, virus iconography. Red-tinted background (#FFF0F0).
      Encodes the problem state — pediatric respiratory vulnerability.
    weight: 0.85
    energy: 0.0
    stability: 1.0
    valence: -1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channel: pale red gradient (left edge). Spatial position
      encodes disease state. All elements inside carry negative valence.

  - id: "space:immuno:zone_healthy"
    name: "Zone Saine (droite)"
    node_type: space
    synthesis: >
      Right zone of the GA. Contains healthy child pictogram, evidence
      hierarchy bars, IgA convergence label, "Protected airways" text.
      Green-tinted background (#F0FFFB). Encodes the resolution state.
    weight: 0.90
    energy: 0.0
    stability: 1.0
    valence: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channel: pale green gradient (right edge). Spatial position
      encodes health/protection. All elements inside carry positive valence.

  - id: "space:immuno:bronchus"
    name: "Bronche Vivante (centre)"
    node_type: space
    synthesis: >
      Central anatomical structure: longitudinal bronchial cross-section
      spanning 66% of canvas width. 4 tissue bands stacked vertically
      (lumen, epithelium, lamina propria, smooth muscle). Left half is
      sick (inflamed), right half is healthy (repaired). The mechanism
      zone where all 4 immunomodulators act.
    weight: 1.0
    energy: 0.0
    stability: 1.0
    valence: 0.0
    permanence: 1.0
    ambivalence: 0.0
    hierarchy: 1.0
    content: >
      Visual channel: the bronchus IS the GA. It occupies the visual
      center and the majority of canvas area. Sick-to-healthy gradient
      runs left-to-right within the structure. Band heights encode
      relative tissue thickness. The bronchus is the spatial container
      for all mechanistic information.

  # ---------------------------------------------------------------------------
  # THINGS — Products (the 4 immunomodulators)
  # ---------------------------------------------------------------------------

  - id: "thing:om85"
    name: "OM-85"
    node_type: thing
    synthesis: >
      Bacterial lysate. Dominant product in the GA. Acts at lumen level —
      IgA secretion. Represented by blue shield icon (#2563EB). 18 RCTs
      = strongest evidence base. Highest bar in evidence hierarchy.
    weight: 1.0
    energy: 0.0
    stability: 0.95
    hierarchy: 1.0
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channels: (1) Color = #2563EB blue, unique product identity.
      (2) Shield icon = protection metaphor. (3) Evidence bar length = 100%
      of max width. (4) Position in lumen band = mechanism of action.
      (5) "18 RCTs" label = quantified trust.

  - id: "thing:pmbl"
    name: "PMBL"
    node_type: thing
    synthesis: >
      Polyvalent mechanical bacterial lysate. Acts at epithelium level —
      barrier repair (tight junctions, staple metaphor). Teal color
      (#0D9488). 5 RCTs evidence.
    weight: 0.65
    energy: 0.0
    stability: 0.80
    hierarchy: 0.65
    trust: 0.80
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channels: (1) Color = #0D9488 teal. (2) Staple/repair
      icons at epithelial gaps. (3) Evidence bar = 55% of max width.
      (4) Position in epithelium band.

  - id: "thing:mv130"
    name: "MV130"
    node_type: thing
    synthesis: >
      Sublingual bacterial preparation. Acts at lamina propria level —
      dendritic cell training, trained immunity. Violet color (#7C3AED).
      DNA helix icon inside DC cell. 1 RCT evidence.
    weight: 0.35
    energy: 0.0
    stability: 0.50
    hierarchy: 0.35
    trust: 0.50
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channels: (1) Color = #7C3AED violet. (2) Helix icon
      inside dendritic cell nucleus = mechanistic precision. (3) Evidence
      bar = 30% of max width. (4) Position in lamina propria band.
      (5) Gold glow (#FDE68A) around DC = trained immunity visual.

  - id: "thing:crl1505"
    name: "CRL1505"
    node_type: thing
    synthesis: >
      Lactobacillus rhamnosus CRL1505. Acts via gut-lung axis relay —
      only product whose mechanism involves a remote organ. Green color
      (#059669). Bridge/arc icon from gut to bronchus. Preclinical only.
    weight: 0.15
    energy: 0.60
    stability: 0.20
    hierarchy: 0.15
    trust: 0.20
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channels: (1) Color = #059669 green. (2) Bridge arc from gut
      icon to lamina propria = unique relay mechanism. (3) Evidence bar =
      12% of max width (shortest). (4) "Preclinical" label (no RCT count).
      (5) energy=0.60 because the relay concept is novel and visually
      compelling despite lowest evidence.

  # ---------------------------------------------------------------------------
  # THINGS — Anatomy (the 4 tissue layers)
  # ---------------------------------------------------------------------------

  - id: "thing:lumen"
    name: "Lumen (voies aériennes)"
    node_type: thing
    synthesis: >
      Topmost band of bronchial cross-section. Airway space. Contains
      viruses (left/sick side), IgA antibodies (right/healthy side),
      OM-85 shield at transition. 15% of bronchus height.
    weight: 0.70
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Background color: #F8FAFC (near-white). Left side: red virus
      particles with spikes. Right side: IgA Y-shapes converging.
      The lumen is where infection enters and where IgA provides
      first-line defense.

  - id: "thing:epithelium"
    name: "Épithélium"
    node_type: thing
    synthesis: >
      Second band from top. Epithelial barrier. Left/sick side shows
      broken cells with gaps (6 gaps). Right/healthy side shows intact
      tight junctions, cilia, PMBL staples. 28% of bronchus height.
    weight: 0.75
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Sick side: #FECACA pale red, broken cells, missing tight junctions.
      Healthy side: #D1FAE5 pale green, intact cells with #374151 tight
      junction zigzags, 6 cilia per cell. 42 total cells across width.

  - id: "thing:lamina_propria"
    name: "Lamina Propria"
    node_type: thing
    synthesis: >
      Third band. Immune cell layer. Contains dendritic cells, macrophages,
      T-helper cells, Treg cells. MV130 helix inside DC nucleus. Th1/Th2
      balance visualization. CRL1505 relay target. 35% of bronchus height
      (largest band = most mechanistic detail).
    weight: 0.80
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Background: #F3F4F6 with crosshatch texture. Split into upper
      adaptive (Th1/Th2 balance) and lower innate (DC + trained immunity).
      Immune cells: macrophages (#9CA3AF dormant, #3B82F6 active),
      T-helper (#60A5FA), Treg (#34D399). DC radius 42px.

  - id: "thing:muscle"
    name: "Muscle lisse"
    node_type: thing
    synthesis: >
      Bottom band. Smooth muscle. Left/sick side is thickened (100% band
      height = remodeling). Right/healthy side is thin (45% = resolved).
      22% of bronchus height.
    weight: 0.55
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Sick side: #FBBF24 amber (inflamed, full thickness). Healthy side:
      #86EFAC light green (45% thickness). Fiber lines at 12% opacity.
      Muscle thickness gradient encodes remodeling severity.

  # ---------------------------------------------------------------------------
  # THINGS — Immune elements
  # ---------------------------------------------------------------------------

  - id: "thing:iga"
    name: "IgA (convergence target)"
    node_type: thing
    synthesis: >
      Secretory IgA antibodies in the lumen (right/healthy side). The
      convergence target — all 4 products ultimately lead to IgA-mediated
      protection. Y-shaped icons. "Convergence vers la Protection (IgA)".
    weight: 0.85
    energy: 0.0
    stability: 0.90
    permanence: 1.0
    ambivalence: 0.0
    hierarchy: 0.90
    content: >
      Visual channel: Y-shaped antibody icons clustered on right side
      of lumen. Label "IgA" as convergence endpoint. 4 IgA molecules
      in x_range [0.70, 0.95] of bronchus width.

  - id: "thing:vicious_cycle"
    name: "Cercle Vicieux"
    node_type: thing
    synthesis: >
      Circular diagram in left margin showing the pathological cycle:
      Viral RTIs -> Th2 bias -> Remodeling -> Re-susceptibility -> repeat.
      Bottom label: "Wheezing / Asthma". The problem that the GA proposes
      to break.
    weight: 0.80
    energy: 0.0
    stability: 1.0
    valence: -1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channel: circular/elliptical path with 4 labeled stations
      at cardinal angles. Red-tinted. Arrows connecting stations show
      directionality. Positioned below sick child in left margin.
      radius_x=170, radius_y=130.

  - id: "thing:virus"
    name: "Virus (pathogènes)"
    node_type: thing
    synthesis: >
      Red virus particles in the lumen (left/sick side). Spiky circular
      icons with angry expression marks. Represent the viral aggression
      that initiates the vicious cycle.
    weight: 0.50
    energy: 0.0
    stability: 1.0
    valence: -1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Color: #DC2626 red. Main viruses: radius 22px, 8 spikes, tip
      radius 4px. Extra smaller viruses: radius 14px, 4 additional
      particles. x_range [0.02, 0.38] of bronchus width.

  - id: "thing:dc_cell"
    name: "Cellule dendritique"
    node_type: thing
    synthesis: >
      Dendritic cell in lamina propria. Irregular star shape with 7
      branches. Contains MV130 helix in nucleus. Trained immunity
      gold glow on healthy side. Key antigen-presenting cell.
    weight: 0.55
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Body radius 20px, 7 branches (25-45px), branch width 3px,
      irregularity 0.3. Sick DC at x=0.20, healthy DC at x=0.75.
      Gold glow (#FDE68A) on healthy-side DC = trained immunity marker.

  - id: "thing:th_balance"
    name: "Balance Th1/Th2"
    node_type: thing
    synthesis: >
      Visual element in lamina propria showing the shift from Th2-dominant
      (sick, allergic) to Th1/Th2 balanced (healthy). Positioned at
      x=0.70 in the lamina band.
    weight: 0.45
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Width 120px. Sick side: tilted toward Th2 (bias). Healthy side:
      balanced. Encodes the immunological rebalancing that immunomodulators
      achieve.

  - id: "thing:gut_lung_bridge"
    name: "Pont Intestin-Poumon"
    node_type: thing
    synthesis: >
      The visual bridge/arc element connecting gut icon (intestine, below
      bronchus) to lamina propria (inside bronchus). Unique to CRL1505.
      Arc height 180px, width 350px. Gut icon at y=0.94.
    weight: 0.50
    energy: 0.40
    stability: 0.60
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Color: #059669 green. Arc with 5 pillar support lines. Gut squiggly
      circle (r=25) at bottom, lung two-lobe shape (r=20) at top.
      Enters bronchus at lamina band, x=0.75. Visually striking because
      it breaks the bronchus boundary — only element that spans outside.

  - id: "thing:evidence_bars"
    name: "Barres d'Évidence"
    node_type: thing
    synthesis: >
      Horizontal bar chart in right margin showing evidence hierarchy.
      Title: "Clinical evidence". 4 bars ordered by length: OM-85 (100%),
      PMBL (55%), MV130 (30%), CRL1505 (12%). Bar length = P32 mapping
      of RCT count to visual prominence.
    weight: 0.85
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    hierarchy: 1.0
    content: >
      Visual channel: bar LENGTH encodes evidence strength (P32).
      Bar COLOR encodes product identity (same palette as bronchus).
      Vertical ORDER encodes hierarchy (strongest on top). Labels
      provide exact RCT counts. This is the most explicit quantitative
      element in the GA.

  - id: "thing:title_banner"
    name: "Titre du GA"
    node_type: thing
    synthesis: >
      "Briser le Cercle Vicieux des Infections Respiratoires Pédiatriques"
      — the GA title. Positioned at top of canvas. Sets the narrative
      frame: this is about BREAKING a cycle, not just treating infections.
    weight: 0.70
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0

  - id: "thing:protected_airways_label"
    name: "Label 'Protected airways'"
    node_type: thing
    synthesis: >
      Text label on the right/healthy side of the bronchus. Marks the
      endpoint of the therapeutic journey. Accompanies IgA convergence.
    weight: 0.40
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0

  # ---------------------------------------------------------------------------
  # NARRATIVES — interpretive structures
  # ---------------------------------------------------------------------------

  - id: "narrative:fracture"
    name: "Fracture du Cycle Pathologique"
    node_type: narrative
    synthesis: >
      The central thesis of the GA. A green arc or visual fracture line
      (F10 feature) breaks the vicious cycle. This is not textual — it
      is encoded visually by the sick-to-healthy gradient across the
      bronchus and the cycle interruption. The message: immunomodulators
      don't just treat, they BREAK the self-reinforcing disease loop.
    weight: 0.95
    energy: 0.0
    stability: 0.90
    permanence: 1.0
    ambivalence: 0.0
    valence: 1.0
    content: >
      Visual channel: the entire left-to-right gradient IS the fracture
      narrative. Sick left -> mechanism center -> healthy right. The
      bronchus structure spatially encodes the transformation. F10:
      visual line fracture replaces text "Broken Cycle" (removed from
      content.yaml V3 to save word budget).

  - id: "narrative:evidence_hierarchy"
    name: "Hiérarchie d'Évidence"
    node_type: narrative
    synthesis: >
      OM-85 (18 RCTs) > PMBL (5 RCTs) > MV130 (1 RCT) > CRL1505
      (Preclinical). The evidence gradient. Mapped to bar length,
      node weight, trust values, and visual prominence throughout
      the GA. More evidence = more visual real estate.
    weight: 0.90
    energy: 0.0
    stability: 1.0
    permanence: 1.0
    ambivalence: 0.0
    hierarchy: 1.0
    content: >
      Encoded in THREE visual channels simultaneously:
      (1) Evidence bar length (P32 mapping in right margin).
      (2) Icon size/prominence within bronchus bands.
      (3) Trust dimension on all product nodes.
      This triple encoding ensures hierarchy is perceived even at
      thumbnail resolution.

  - id: "narrative:gut_lung_axis"
    name: "Axe Intestin-Poumon"
    node_type: narrative
    synthesis: >
      CRL1505's unique mechanism: a probiotic strain in the gut sends
      immune signals to the lung via the gut-lung axis. Only product
      whose action is indirect/remote. Visually encoded by the bridge
      arc that exits the bronchus boundary. Novel but preclinical.
    weight: 0.60
    energy: 0.40
    stability: 0.50
    permanence: 1.0
    ambivalence: 0.0
    content: >
      The gut-lung axis is the most conceptually novel element in the
      GA. The bridge arc is the only visual element that breaks the
      bronchus containment boundary, making it visually distinctive
      despite CRL1505 having the weakest evidence.

  - id: "narrative:layer_specificity"
    name: "Spécificité par Couche"
    node_type: narrative
    synthesis: >
      Each immunomodulator acts at a specific tissue layer. This is
      the mechanistic thesis: different products target different
      depths of the airway. OM-85=lumen, PMBL=epithelium, MV130=lamina
      propria, CRL1505=gut-lung relay to lamina. Encoded by vertical
      position within the bronchus.
    weight: 0.85
    energy: 0.0
    stability: 0.90
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Visual channel: VERTICAL POSITION within the bronchus bands.
      Each product's icon is placed in its target layer. This is the
      key structural insight of the V2A design — the bronchial
      cross-section naturally creates a spatial axis for mechanism depth.

  # ---------------------------------------------------------------------------
  # ACTORS — the child pictograms
  # ---------------------------------------------------------------------------

  - id: "actor:child_sick"
    name: "Enfant Malade"
    node_type: actor
    synthesis: >
      Left margin pictogram. Hunched kinematic rig: spine_bend=35,
      head drooping, arm near mouth (coughing), narrow stance.
      Cough marks + 3 distress lines. Red-tinted. Represents the
      patient in the vicious cycle.
    weight: 0.70
    energy: 0.0
    stability: 1.0
    valence: -1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Generator: child(sick). Kinematic params: spine_bend=35, head_tilt=-20,
      arm_angle_R=-30 (coughing), leg_spread=8, cough_marks=true,
      distress_lines=3. Positioned at x=0.50, y=0.18 within margin_left.

  - id: "actor:child_healthy"
    name: "Enfant en Santé"
    node_type: actor
    synthesis: >
      Right margin pictogram. Upright kinematic rig: spine_bend=-5 (proud),
      head looking up, arms spread wide (liberation), wide stable stance.
      Sparkle marks + smile. Green-tinted. Represents the resolved patient.
    weight: 0.70
    energy: 0.0
    stability: 1.0
    valence: 1.0
    permanence: 1.0
    ambivalence: 0.0
    content: >
      Generator: child(healthy). Kinematic params: spine_bend=-5,
      head_tilt=10, arm_angle=50 (spread), leg_spread=22, sparkle_marks=true,
      smile=true. Positioned at x=0.50, y=0.18 within margin_right.

  # ---------------------------------------------------------------------------
  # MOMENTS — evidence events
  # ---------------------------------------------------------------------------

  - id: "moment:18_rcts"
    name: "18 RCTs (OM-85)"
    node_type: moment
    synthesis: >
      Corpus of 18 randomized controlled trials supporting OM-85 efficacy
      in pediatric respiratory infections. Strongest evidence base among
      the 4 products. Mapped to longest bar in evidence hierarchy.
    weight: 1.0
    energy: 0.0
    stability: 0.95
    trust: 0.95
    permanence: 1.0
    ambivalence: 0.0

  - id: "moment:5_rcts"
    name: "5 RCTs (PMBL)"
    node_type: moment
    synthesis: >
      5 randomized controlled trials supporting PMBL efficacy.
      Second-strongest evidence. Mapped to 55% bar length.
    weight: 0.65
    energy: 0.0
    stability: 0.85
    trust: 0.80
    permanence: 1.0
    ambivalence: 0.0

  - id: "moment:1_rct"
    name: "1 RCT (MV130)"
    node_type: moment
    synthesis: >
      Single randomized controlled trial for MV130. Limited but
      clinical-grade evidence. Mapped to 30% bar length.
    weight: 0.35
    energy: 0.0
    stability: 0.60
    trust: 0.50
    permanence: 1.0
    ambivalence: 0.0

  - id: "moment:preclinical"
    name: "Préclinique (CRL1505)"
    node_type: moment
    synthesis: >
      Preclinical evidence only for CRL1505. Animal models, in vitro.
      No human RCTs. Weakest evidence tier. Mapped to 12% bar length.
      Label reads "Preclinical" (no RCT count).
    weight: 0.15
    energy: 0.40
    stability: 0.30
    trust: 0.20
    permanence: 1.0
    ambivalence: 0.0

# =============================================================================
# LINKS
# =============================================================================

links:

  # ---------------------------------------------------------------------------
  # Products → Tissue layers (mechanism of action)
  # ---------------------------------------------------------------------------

  - id: "link:om85_to_lumen"
    node_a: "thing:om85"
    node_b: "thing:lumen"
    weight: 0.95
    trust: 0.95
    affinity: 1.0
    permanence: 1.0
    synthesis: "OM-85 acts at lumen level — IgA secretion into airway space. Shield icon positioned in lumen band."

  - id: "link:pmbl_to_epithelium"
    node_a: "thing:pmbl"
    node_b: "thing:epithelium"
    weight: 0.80
    trust: 0.80
    affinity: 1.0
    permanence: 1.0
    synthesis: "PMBL acts at epithelium level — tight junction repair, barrier restoration. Staple icons in epithelial gaps."

  - id: "link:mv130_to_lamina"
    node_a: "thing:mv130"
    node_b: "thing:lamina_propria"
    weight: 0.50
    trust: 0.50
    affinity: 1.0
    permanence: 1.0
    synthesis: "MV130 acts at lamina propria — dendritic cell training, trained immunity. Helix inside DC nucleus."

  - id: "link:crl1505_to_lamina"
    node_a: "thing:crl1505"
    node_b: "thing:lamina_propria"
    weight: 0.20
    trust: 0.20
    affinity: 0.8
    permanence: 1.0
    synthesis: "CRL1505 acts via gut-lung relay TO lamina propria. Indirect mechanism. Bridge arc enters at lamina band."

  # ---------------------------------------------------------------------------
  # Products → Evidence moments (trust links)
  # ---------------------------------------------------------------------------

  - id: "link:om85_to_18rcts"
    node_a: "thing:om85"
    node_b: "moment:18_rcts"
    weight: 1.0
    trust: 0.95
    stability: 0.95
    permanence: 1.0
    synthesis: "OM-85 is supported by 18 RCTs. Strongest evidence-product coupling."

  - id: "link:pmbl_to_5rcts"
    node_a: "thing:pmbl"
    node_b: "moment:5_rcts"
    weight: 0.65
    trust: 0.80
    stability: 0.85
    permanence: 1.0
    synthesis: "PMBL is supported by 5 RCTs."

  - id: "link:mv130_to_1rct"
    node_a: "thing:mv130"
    node_b: "moment:1_rct"
    weight: 0.35
    trust: 0.50
    stability: 0.60
    permanence: 1.0
    synthesis: "MV130 is supported by 1 RCT."

  - id: "link:crl1505_to_preclinical"
    node_a: "thing:crl1505"
    node_b: "moment:preclinical"
    weight: 0.15
    trust: 0.20
    stability: 0.30
    permanence: 1.0
    synthesis: "CRL1505 has preclinical evidence only. No human RCTs."

  # ---------------------------------------------------------------------------
  # Products → IgA (convergence target)
  # ---------------------------------------------------------------------------

  - id: "link:om85_to_iga"
    node_a: "thing:om85"
    node_b: "thing:iga"
    weight: 0.95
    affinity: 1.0
    trust: 0.95
    permanence: 1.0
    synthesis: "OM-85 directly promotes IgA secretion — the most direct product-to-convergence link."

  - id: "link:pmbl_to_iga"
    node_a: "thing:pmbl"
    node_b: "thing:iga"
    weight: 0.60
    affinity: 0.7
    trust: 0.70
    permanence: 1.0
    synthesis: "PMBL contributes to IgA convergence via restored epithelial barrier enabling IgA transport."

  - id: "link:mv130_to_iga"
    node_a: "thing:mv130"
    node_b: "thing:iga"
    weight: 0.40
    affinity: 0.5
    trust: 0.50
    permanence: 1.0
    synthesis: "MV130 contributes to IgA convergence via trained immunity in lamina propria."

  - id: "link:crl1505_to_iga"
    node_a: "thing:crl1505"
    node_b: "thing:iga"
    weight: 0.20
    affinity: 0.4
    trust: 0.20
    permanence: 1.0
    synthesis: "CRL1505 contributes to IgA convergence via gut-lung axis relay (indirect)."

  # ---------------------------------------------------------------------------
  # Vicious cycle → Fracture narrative (the breaking)
  # ---------------------------------------------------------------------------

  - id: "link:cycle_to_fracture"
    node_a: "thing:vicious_cycle"
    node_b: "narrative:fracture"
    weight: 0.95
    friction: 0.90
    valence: 1.0
    permanence: 1.0
    synthesis: >
      The vicious cycle is BROKEN by the fracture. High friction = the cycle
      resists but is overcome. This is the central dramatic tension of the GA.

  - id: "link:fracture_to_bronchus"
    node_a: "narrative:fracture"
    node_b: "space:immuno:bronchus"
    weight: 0.90
    affinity: 1.0
    permanence: 1.0
    synthesis: "The fracture narrative is spatially encoded by the bronchus left-to-right gradient (sick → healthy)."

  # ---------------------------------------------------------------------------
  # Actors → their context
