# =============================================================================
# VISUAL CHANNEL SCORING
# =============================================================================
# How each information vector is encoded in the GA's visual language:
#
# CHANNEL               | INFORMATION VECTOR              | NOTES
# ----------------------|--------------------------------|-------------------------------
# Bar LENGTH (P32)      | Evidence hierarchy              | 100%/55%/30%/12% — strongest quantitative channel
# HUE (product palette) | Product identity                | Blue/teal/violet/green — categorical, max discriminability
# SPATIAL POSITION (x)  | Disease → health transition     | Left=sick, right=healthy — the macro narrative axis
# SPATIAL POSITION (y)  | Mechanism depth (tissue layer)  | Top=lumen, bottom=muscle — vertical axis within bronchus
# GRADIENT (L→R)        | Severity/resolution             | Red tint → white → green tint across full canvas
# ICON SHAPE            | Mechanism metaphor              | Shield=protection, staple=repair, helix=training, bridge=relay
# ICON SIZE             | Visual prominence (≈ evidence)  | OM-85 shield largest, CRL1505 bridge thinnest
# CONTAINMENT           | Spatial belonging               | Bronchus contains layers, layers contain products
# BOUNDARY BREACH       | Novelty/exception               | CRL1505 bridge is the ONLY element that exits bronchus boundary
# POSTURE (kinematic)   | Patient state                   | Hunched/coughing vs upright/smiling — empathetic encoding
# THICKNESS             | Pathological remodeling         | Muscle band: 100% sick vs 45% healthy — proportional encoding
# CELL INTEGRITY        | Barrier health                  | Gaps in epithelium (sick) vs tight junctions (healthy)
# GOLD GLOW             | Trained immunity                | #FDE68A on healthy-side DC — unique visual marker for MV130 effect
# LABEL TEXT            | Quantified evidence             | "18 RCTs", "5 RCTs", "1 RCT", "Preclinical" — exact counts
# COLOR SATURATION      | Zone valence                    | Full red (sick zone) → white (neutral) → full green (healthy zone)
# VERTICAL ORDER        | Evidence rank                   | Top bar = strongest (OM-85), bottom = weakest (CRL1505)
# ARROW DIRECTION       | Cycle directionality            | Clockwise in vicious cycle, left-to-right across bronchus
# CILIA PRESENCE        | Epithelial function             | Present on healthy side, absent on sick side
# CROSSHATCH TEXTURE    | Tissue grain (lamina propria)   | Subtle background encoding of tissue type
# FIBER LINES           | Muscle tissue identity          | Parallel lines at 12% opacity in muscle band
#
# Total visual channels: 20
# Total information vectors mapped to nodes: 30 nodes, 48 links
#
# Key design insight: The bronchial cross-section serves as a SPATIAL
# COORDINATE SYSTEM where x-axis = disease progression and y-axis =
# mechanism depth. This dual-axis encoding is the fundamental innovation
# of the V2A "Bronche Vivante" design — it allows 4 products to be
# compared simultaneously on both their evidence strength (x/bars) and
# their mechanistic target (y/band position).
